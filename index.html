      <div class="sizes-list" id="sf-item-sizes">${sizeRows}</div>
    </div>
    <div class="form-row" style="gap:16px;margin-top:10px">
      <div class="form-field"><label>Nhóm tùy chọn</label><div class="settings-check-list">${optChecks}</div></div>
      <div class="form-field"><label>Nhóm topping</label><div class="settings-check-list">${tgrpChecks}</div></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost btn-sm" data-sact="cancel-item-form" data-catid="${catId}">Hủy</button>
      <button class="btn btn-primary btn-sm" data-sact="${isNew?'save-new-item':'save-edit-item'}" data-id="${item?.id||''}" data-catid="${catId}">Lưu</button>

    <div class="sf-radio-row" style="margin-bottom:10px">${modeRadios('receipt', ps.receipt.mode)}</div>
    <div class="form-field"><label>Máy in</label>${printerSelect('ps-receipt-printer', ps.receipt.printer)}</div>
  </div>

  <div class="settings-form" style="margin-bottom:12px">

function handleSettingsEvent(e) {
  if (e.target.classList.contains('drag-handle')) return;
  const stabEl = e.target.closest('[data-stab]');
  if (stabEl) {
    settingsState.tab = stabEl.dataset.stab;
    settingsState.editing = null;
    settingsState.addingIn = null;
    renderSettings();
    return;
  }
  const sactEl = e.target.closest('[data-sact]');
  if (!sactEl) return;
  const act = sactEl.dataset.sact;
  const id = sactEl.dataset.id || '';
  const catId = sactEl.dataset.catid || '';

  if (act === 'export') { exportMenuJson(); return; }

  // ---- SHOP ----
  if (act === 'save-shop') {
    const s = MENU.shop;
    s.name = $('#sf-shop-name').value.trim() || s.name;
    s.tagline = $('#sf-shop-tagline').value.trim();
    s.phone = $('#sf-shop-phone').value.trim();
    s.hours = $('#sf-shop-hours').value.trim();
    s.wifi = $('#sf-shop-wifi').value.trim();
    const pu = parseInt($('#sf-shop-priceunit').value);
    if (pu > 0) { s.priceUnit = pu; PRICE_UNIT = pu; }
    saveMenuOverride();
    toast('Đã lưu thông tin cửa hàng');
    renderSettings();
    return;
  }

  // ---- TOPPINGS ----
  if (act === 'add-topping') { settingsState.addingIn={section:'toppings'}; settingsState.editing=null; renderSettings(); return; }
  if (act === 'edit-topping') { settingsState.editing={section:'toppings',id}; settingsState.addingIn=null; renderSettings(); return; }
  if (act === 'cancel-topping-form') { settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return; }
  if (act === 'del-topping') {
    if (!confirm('Xóa topping "' + (MENU.toppings.find(t=>t.id===id)?.name||id) + '"?')) return;
    MENU.toppings = MENU.toppings.filter(t => t.id !== id);
    for (const g of MENU.toppingGroups) if (g.toppingIds) g.toppingIds = g.toppingIds.filter(tid => tid !== id);
    saveMenuOverride(); toast('Đã xóa topping'); renderSettings(); return;
  }
  if (act === 'save-new-topping' || act === 'save-edit-topping') {
    const name = $('#sf-topping-name').value.trim();
    const tid = $('#sf-topping-id').value.trim();
    const price = parseFloat($('#sf-topping-price').value) || 0;
    if (!name || !tid) { toast('Cần nhập đủ tên và ID'); return; }
    if (act === 'save-new-topping' && MENU.toppings.find(t => t.id === tid)) { toast('ID đã tồn tại'); return; }
    if (act === 'save-new-topping') {
      MENU.toppings.push({id:tid, name, price});
    } else {
      const t = MENU.toppings.find(t => t.id === id);
      if (t) { t.name = name; t.price = price; }
    }
    saveMenuOverride();
    toast(act === 'save-new-topping' ? 'Đã thêm topping' : 'Đã lưu');
    settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return;
  }

  // ---- TOPPING GROUPS ----
  if (act === 'add-tgroup') { settingsState.addingIn={section:'toppingGroups'}; settingsState.editing=null; renderSettings(); return; }
  if (act === 'edit-tgroup') { settingsState.editing={section:'toppingGroups',id}; settingsState.addingIn=null; renderSettings(); return; }
  if (act === 'cancel-tgroup-form') { settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return; }
  if (act === 'del-tgroup') {
    if (!confirm('Xóa nhóm topping này?')) return;
    MENU.toppingGroups = MENU.toppingGroups.filter(g => g.id !== id);
    saveMenuOverride(); toast('Đã xóa nhóm topping'); renderSettings(); return;
  }
  if (act === 'save-new-tgroup' || act === 'save-edit-tgroup') {
    const name = $('#sf-tgroup-name').value.trim();
    const gid = $('#sf-tgroup-id').value.trim();
    const typeRadio = $('input[name="sf-tgroup-type"]:checked');
    const isAll = !typeRadio || typeRadio.value === 'all';
    if (!name || !gid) { toast('Cần nhập đủ tên và ID'); return; }
    if (act === 'save-new-tgroup' && MENU.toppingGroups.find(g => g.id === gid)) { toast('ID đã tồn tại'); return; }
    const groupData = {id:gid, name};
    if (isAll) { groupData.all = true; }
    else { groupData.toppingIds = readCheckedValues('.sf-tgroup-tid'); }
    if (act === 'save-new-tgroup') {
      MENU.toppingGroups.push(groupData);
    } else {
      const idx = MENU.toppingGroups.findIndex(g => g.id === id);
      if (idx >= 0) MENU.toppingGroups[idx] = groupData;
    }
    saveMenuOverride();
    toast(act === 'save-new-tgroup' ? 'Đã thêm nhóm topping' : 'Đã lưu');
    settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return;
  }

  // ---- OPTION GROUPS ----
  if (act === 'add-optgroup') { settingsState.addingIn={section:'optionGroups'}; settingsState.editing=null; renderSettings(); return; }
  if (act === 'edit-optgroup') { settingsState.editing={section:'optionGroups',id}; settingsState.addingIn=null; renderSettings(); return; }
  if (act === 'cancel-optgroup-form') { settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return; }
  if (act === 'del-optgroup') {
    if (!confirm('Xóa nhóm tùy chọn này?')) return;
    MENU.optionGroups = MENU.optionGroups.filter(g => g.id !== id);
    saveMenuOverride(); toast('Đã xóa'); renderSettings(); return;
  }
  if (act === 'add-optval') {
    const list = $('#sf-optval-list');
    if (!list) return;
    const idx = list.querySelectorAll('.sf-optval-row').length;
    const row = document.createElement('div');
    row.className = 'size-row sf-optval-row';
    row.dataset.vi = idx;
    row.innerHTML = `<input type="text" class="sf-optval-value" placeholder="value" style="max-width:80px">
      <input type="text" class="sf-optval-label" placeholder="Nhãn">
      <input type="text" class="sf-optval-delta" placeholder="Phụ phí" style="max-width:150px">
      <button class="btn btn-danger-ghost btn-sm" data-sact="del-optval" data-vi="${idx}" style="padding:4px 8px;flex-shrink:0">×</button>`;
    list.appendChild(row);
    return;
  }
  if (act === 'del-optval') {
    const vi = parseInt(sactEl.dataset.vi);
    const list = $('#sf-optval-list');
    if (list) { const rows = list.querySelectorAll('.sf-optval-row'); if (rows[vi]) rows[vi].remove(); }
    return;
  }
  if (act === 'save-new-optgroup' || act === 'save-edit-optgroup') {
    const label = $('#sf-optgroup-label').value.trim();
    const gid = $('#sf-optgroup-id').value.trim();
    const required = $('#sf-optgroup-required').value === 'true';
    const defVal = $('#sf-optgroup-default').value.trim();
    const values = readOptValsFromForm();
    if (!label || !gid) { toast('Cần nhập đủ tên và ID'); return; }
    if (!values.length) { toast('Cần ít nhất 1 lựa chọn'); return; }
    if (act === 'save-new-optgroup' && MENU.optionGroups.find(g => g.id === gid)) { toast('ID đã tồn tại'); return; }
    const groupData = {id:gid, label, type:'single', required, default:defVal, values};
    if (act === 'save-new-optgroup') {
      MENU.optionGroups.push(groupData);
    } else {
      const idx = MENU.optionGroups.findIndex(g => g.id === id);
      if (idx >= 0) MENU.optionGroups[idx] = groupData;
    }
    saveMenuOverride();
    toast(act === 'save-new-optgroup' ? 'Đã thêm nhóm tùy chọn' : 'Đã lưu');
    settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return;
  }

  // ---- CATEGORIES ----
  if (act === 'toggle-cat') {
    settingsState.expandedCat = settingsState.expandedCat === id ? null : id;
    if (settingsState.editing?.section !== 'cat-name') { settingsState.editing=null; settingsState.addingIn=null; }
    renderSettings(); return;
  }
  if (act === 'add-cat') { settingsState.addingIn={section:'categories'}; settingsState.editing=null; renderSettings(); return; }
  if (act === 'edit-cat-name') {
    settingsState.editing={section:'cat-name',id};
    if (settingsState.expandedCat !== id) settingsState.expandedCat = null;
    renderSettings(); return;
  }
  if (act === 'del-cat') {
    const catObj = MENU.categories.find(c => c.id === id);
    if (!confirm(`Xóa danh mục "${catObj?.name||id}" và ${catObj?.items?.length||0} món?`)) return;
    MENU.categories = MENU.categories.filter(c => c.id !== id);
    if (settingsState.expandedCat === id) settingsState.expandedCat = null;
    saveMenuOverride(); toast('Đã xóa danh mục'); renderSettings(); return;
  }
  if (act === 'cancel-cat-form') { settingsState.addingIn=null; settingsState.editing=null; renderSettings(); return; }
  if (act === 'save-new-cat') {
    const name = $('#sf-cat-name').value.trim();
    const cid = $('#sf-cat-id').value.trim();
    if (!name || !cid) { toast('Cần nhập đủ tên và ID'); return; }
    if (MENU.categories.find(c => c.id === cid)) { toast('ID đã tồn tại'); return; }
    MENU.categories.push({id:cid, name, items:[]});
    saveMenuOverride(); toast('Đã thêm danh mục');
    settingsState.addingIn=null; settingsState.expandedCat=cid; renderSettings(); return;
  }
  if (act === 'save-edit-cat') {
    const cat = MENU.categories.find(c => c.id === id);
    const newName = $('#sf-cat-name');
    if (cat && newName?.value.trim()) { cat.name = newName.value.trim(); saveMenuOverride(); toast('Đã lưu tên danh mục'); }
    settingsState.editing=null; renderSettings(); return;
  }

  // ---- ITEMS ----
  if (act === 'add-item') {
    settingsState.addingIn={section:'items', catId};
    settingsState.editing=null;
    settingsState.expandedCat=catId;
    renderSettings(); return;
  }
  if (act === 'edit-item') {
    settingsState.editing={section:'item', id};
    settingsState.addingIn=null;
    const ownerCat = MENU.categories.find(c => c.items.some(i => i.id === id));
    if (ownerCat) settingsState.expandedCat=ownerCat.id;
    renderSettings(); return;
  }
  if (act === 'del-item') {
    const ownerCat = MENU.categories.find(c => c.id === catId);
    const itemName = ownerCat?.items?.find(i => i.id === id)?.name || id;
    if (!confirm(`Xóa món "${itemName}"?`)) return;
    if (ownerCat) ownerCat.items = ownerCat.items.filter(i => i.id !== id);
    saveMenuOverride(); toast('Đã xóa món'); renderSettings(); return;
  }
  if (act === 'cancel-item-form') { settingsState.addingIn=null; settingsState.editing=null; renderSettings(); return; }
  if (act === 'add-size') {
    const list = $('#sf-item-sizes');
    if (!list) return;
    const idx = list.querySelectorAll('.sf-size-row').length;
    const row = document.createElement('div');
    row.className = 'size-row sf-size-row'; row.dataset.si = idx;
    row.innerHTML = `<input type="text" class="sf-size-size" placeholder="Size" style="max-width:60px">
      <input type="number" class="sf-size-price" placeholder="Giá">
      <button class="btn btn-danger-ghost btn-sm" data-sact="del-size" data-si="${idx}" style="padding:4px 8px;flex-shrink:0">×</button>`;
    list.appendChild(row); return;
  }
  if (act === 'del-size') {
    const si = parseInt(sactEl.dataset.si);
    const list = $('#sf-item-sizes');
    if (list) { const rows = list.querySelectorAll('.sf-size-row'); if (rows[si]) rows[si].remove(); }
    return;
  }
  if (act === 'save-new-item' || act === 'save-edit-item') {
    const name = $('#sf-item-name').value.trim();
    const iid = $('#sf-item-id').value.trim();
    const note = $('#sf-item-note').value.trim();
    const hot = $('#sf-item-hot').checked;
    const isNewFlag = $('#sf-item-isnew').checked;
    const sizes = readSizesFromForm();
    const optGroupIds = readCheckedValues('.sf-item-optg');
    const tGroupIds = readCheckedValues('.sf-item-tgrp');
    if (!name || !iid) { toast('Cần nhập đủ tên và ID'); return; }
    if (!sizes.length) { toast('Cần ít nhất 1 size và giá'); return; }
    if (act === 'save-new-item' && MENU.categories.some(c => c.items.some(i => i.id === iid))) { toast('ID món đã tồn tại'); return; }
    const itemData = {id:iid, name, sizes, optionGroupIds:optGroupIds, toppingGroupIds:tGroupIds};
    if (hot) itemData.hot = true;
    if (isNewFlag) itemData.isNew = true;
    if (note) itemData.note = note;
    if (act === 'save-new-item') {
      const cat = MENU.categories.find(c => c.id === catId);
      if (cat) cat.items.push(itemData);
    } else {
      const ownerCat = MENU.categories.find(c => c.items.some(i => i.id === id));
      if (ownerCat) { const idx = ownerCat.items.findIndex(i => i.id === id); if (idx >= 0) ownerCat.items[idx] = itemData; }
    }
    saveMenuOverride();
    toast(act === 'save-new-item' ? 'Đã thêm món' : 'Đã lưu');
    settingsState.editing=null; settingsState.addingIn=null; renderSettings(); return;
  }

  // ---- PRINTER SETTINGS ----
  if (act === 'ps-connect') {
    const url = ($('#ps-server-url')?.value || '').trim();
    const statusEl = $('#ps-connect-status');
    if (!url) { toast('Nhập URL server trước'); return; }
    statusEl.textContent = 'Đang kết nối...';
    statusEl.style.color = 'var(--muted)';
    fetch(url + '/api/printers/shared')
      .then(r => r.json())
      .then(data => {
        const list = data.printers || [];
        const opts = '<option value="">— Chọn máy in —</option>' +
          list.map(p => `<option value="${escHtml(p.name)}">${escHtml(p.name)} (${escHtml(p.device)})</option>`).join('');
        $$('.ps-printer-select').forEach(sel => {
          const saved = sel.dataset.saved;
          sel.innerHTML = opts;
          if (saved) sel.value = saved;
        });
        getPrintSettings().serverUrl = url;
        savePrintSettings();
        statusEl.textContent = `✅ Đã kết nối — ${list.length} máy in`;
        statusEl.style.color = 'var(--ok)';
      })
      .catch(err => {
        statusEl.textContent = `❌ Không kết nối được: ${err.message}`;
        statusEl.style.color = 'var(--danger)';
      });
    return;
  }
  if (act === 'ps-save') {
    const ps = getPrintSettings();
    ps.serverUrl    = ($('#ps-server-url')?.value || '').trim();
    ps.receipt.mode    = ($('input[name="ps-receipt-mode"]:checked')?.value) || 'dialog';
    ps.receipt.printer = $('#ps-receipt-printer')?.value || '';
    ps.barTicket.mode    = ($('input[name="ps-barTicket-mode"]:checked')?.value) || 'dialog';
    ps.barTicket.printer = $('#ps-bar-printer')?.value || '';
    savePrintSettings();
    toast('Đã lưu cài đặt máy in');
    return;
  }
}

// ============== SETTINGS DRAG-AND-DROP ==============
function clearDndIndicators() {
  $$('.drag-above, .drag-below, .drag-over-cat').forEach(el => {
    el.classList.remove('drag-above', 'drag-below', 'drag-over-cat');
  });
}

function handleSettingsDnD(e) {
  if (e.type === 'dragstart') {
    const handle = e.target.classList.contains('drag-handle') ? e.target : null;
    if (!handle) return;
    _dndSrc = {
      section: handle.dataset.dragSection,
      id: handle.dataset.dragId,
      catId: handle.dataset.dragCatid || null
    };
    const parentRow = handle.closest('.settings-row, .settings-cat-block');
    if (parentRow) {
      e.dataTransfer.setDragImage(parentRow, 20, Math.round(parentRow.offsetHeight / 2));
      parentRow.classList.add('dragging');
    }
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', _dndSrc.id);
    return;
  }

  if (e.type === 'dragend') {
    clearDndIndicators();
    $$('.dragging').forEach(el => el.classList.remove('dragging'));
    _dndSrc = null; _dndOverEl = null;
    return;
  }

  if (e.type === 'dragover') {
    if (!_dndSrc) return;
    clearDndIndicators();
    const section = _dndSrc.section;

    if (section === 'items') {
      const catHeader = e.target.closest('.settings-cat-header');
      if (catHeader) {
        const toCatId = catHeader.closest('[data-cat]')?.dataset.cat;
        if (toCatId && toCatId !== _dndSrc.catId) {
          e.preventDefault();
          catHeader.classList.add('drag-over-cat');
          _dndOverEl = { type: 'cat-header', catId: toCatId };
          return;
        }
      }
      const row = e.target.closest('.settings-row[data-drag-section="items"]');
      if (!row || row.dataset.dragId === _dndSrc.id) return;
      e.preventDefault();
      const r = row.getBoundingClientRect();
      _dndInsertBefore = e.clientY < r.top + r.height / 2;
      row.classList.add(_dndInsertBefore ? 'drag-above' : 'drag-below');
      _dndOverEl = { type: 'row', id: row.dataset.dragId, catId: row.dataset.dragCatid };
      return;
    }

    if (section === 'categories') {
      const catBlock = e.target.closest('.settings-cat-block[data-drag-section="categories"]');
      if (!catBlock || catBlock.dataset.dragId === _dndSrc.id) return;
      e.preventDefault();
      const r = catBlock.getBoundingClientRect();
      _dndInsertBefore = e.clientY < r.top + r.height / 2;
      catBlock.classList.add(_dndInsertBefore ? 'drag-above' : 'drag-below');
      _dndOverEl = { type: 'row', id: catBlock.dataset.dragId, catId: null };
      return;
    }

    const row = e.target.closest(`.settings-row[data-drag-section="${section}"]`);
    if (!row || row.dataset.dragId === _dndSrc.id) return;
    e.preventDefault();
    const r = row.getBoundingClientRect();
    _dndInsertBefore = e.clientY < r.top + r.height / 2;
    row.classList.add(_dndInsertBefore ? 'drag-above' : 'drag-below');
    _dndOverEl = { type: 'row', id: row.dataset.dragId, catId: null };
    return;
  }

  if (e.type === 'drop') {
    e.preventDefault();
    if (!_dndSrc || !_dndOverEl) { clearDndIndicators(); _dndSrc = null; _dndOverEl = null; return; }
    const { section, id: fromId, catId: fromCatId } = _dndSrc;

    if (_dndOverEl.type === 'cat-header') {
      const fromCat = MENU.categories.find(c => c.id === fromCatId);
      const toCat = MENU.categories.find(c => c.id === _dndOverEl.catId);
      if (fromCat && toCat) {
        const idx = fromCat.items.findIndex(i => i.id === fromId);
        if (idx >= 0) {
          const [item] = fromCat.items.splice(idx, 1);
          toCat.items.push(item);
          saveMenuOverride();
          toast(`Đã chuyển "${item.name}" sang "${toCat.name}"`);
        }
      }
      _dndSrc = null; _dndOverEl = null;
      renderSettings();
      return;
    }

    const toId = _dndOverEl.id;
    const toCatId = _dndOverEl.catId;

    let arr;
    if (section === 'toppings') arr = MENU.toppings;
    else if (section === 'toppingGroups') arr = MENU.toppingGroups;
    else if (section === 'optionGroups') arr = MENU.optionGroups;
    else if (section === 'categories') arr = MENU.categories;
    else if (section === 'items') {
      if (fromCatId === toCatId) {
        arr = MENU.categories.find(c => c.id === fromCatId)?.items;
      } else {
        const fromCat = MENU.categories.find(c => c.id === fromCatId);
        const toCat = MENU.categories.find(c => c.id === toCatId);
        if (fromCat && toCat) {
          const idx = fromCat.items.findIndex(i => i.id === fromId);
          if (idx >= 0) {
            const [item] = fromCat.items.splice(idx, 1);
            const toIdx = toCat.items.findIndex(i => i.id === toId);
            toCat.items.splice(toIdx < 0 ? toCat.items.length : (_dndInsertBefore ? toIdx : toIdx + 1), 0, item);
            saveMenuOverride();
            toast(`Đã chuyển "${item.name}" sang "${toCat.name}"`);
          }
        }
        _dndSrc = null; _dndOverEl = null;
        renderSettings();
        return;
      }
    }

    if (arr) {
      const fromIdx = arr.findIndex(x => x.id === fromId);
      if (fromIdx >= 0) {
        const [item] = arr.splice(fromIdx, 1);
        const toIdx = arr.findIndex(x => x.id === toId);
        arr.splice(toIdx < 0 ? arr.length : (_dndInsertBefore ? toIdx : toIdx + 1), 0, item);
        saveMenuOverride();
      }
    }

    _dndSrc = null; _dndOverEl = null;
    renderSettings();
  }
}

// ============== ACTIONS ==============
function handleCartAction(act) {
  const cart = getActiveCart();
  if (!cart) return;

  if (act === 'toggle-paid') {
    setPaid(cart, !cart.paid);
  } else if (act === 'toggle-delivered') {
    setDelivered(cart, !cart.delivered);
  } else if (act === 'cancel') {
    if (!confirm('Hủy đơn ' + cart.displayCode + '?')) return;
    setCancelled(cart);
  } else if (act === 'print-receipt') {
    printReceipt(cart);
    return;
  } else if (act === 'print-bar') {
    printBarTicket(cart);
    return;
  }
  renderAll();
}

// ============== PRINT ==============
function buildLineDescription(line) {
  const found = getItem(line.itemId);
  if (!found) return null;
  const item = found.item;
  const parts = [`Size ${line.size}`];
  if (item.optionGroupIds) {
    for (const gid of item.optionGroupIds) {
      const grp = getOptionGroup(gid);
      if (!grp) continue;
      const v = line.options[grp.id];
      if (!v) continue;
      const valObj = grp.values.find(vv => vv.value === v);
      if (!valObj) continue;
      if (grp.required) parts.push(`${grp.label}: ${valObj.label}`);
      else if (v !== grp.default) parts.push(valObj.label);
    }
  }
  const tops = (line.toppings || []).map(t => {
    const top = getTopping(t.id);
    return top ? (top.name + (t.qty > 1 ? ` x${t.qty}` : '')) : '';
  }).filter(Boolean);
  return { item, parts, tops, line };
}

async function sendToPrintServer(pdfDataUri, serverUrl, printerName, jobName) {
  const base64 = pdfDataUri.split(',')[1];
  try {
    const resp = await fetch(serverUrl + '/api/print', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ printer: printerName, pdf: base64, jobName })
    });
    const result = await resp.json();
    if (result.ok) toast('✅ Đã gửi lệnh in thành công');
    else toast('❌ Server in báo lỗi: ' + (result.error || '?'));
  } catch (err) {
    toast('❌ Không kết nối được server in: ' + err.message);
  }
}

function triggerPdfIframe(uri, frameId) {
  let frame = document.getElementById(frameId);
  if (!frame) {
    frame = document.createElement('iframe');
    frame.id = frameId;
    frame.style.display = 'none';
    document.body.appendChild(frame);
  }
  frame.src = uri;
}

async function printReceipt(cart) {
  if (!window.jspdf?.jsPDF) { toast('Thư viện PDF chưa tải xong, thử lại sau giây lát.'); return; }
  if (!await loadPdfFont()) return;

  const sub  = calcCartSubtotal(cart);
  const disc = calcCartDiscount(cart);
  const total = sub - disc;
  const dtStr = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' }) + ' ' +
                new Date().toLocaleDateString('vi-VN');

  const W = 58, LX = 3, RX = 55, CX = 29; // page width, left/right margin, center

  // ── Pass 1: đo chiều cao nội dung bằng doc tạm ──────────────────
  const mDoc = makePdfDoc('p', W, 500);
  const validLines = cart.lines
    .map(l => ({ line: l, desc: buildLineDescription(l) }))
    .filter(x => x.desc);

  let h = 8;
  mDoc.setFontSize(11);
  h += mDoc.splitTextToSize(MENU.shop.name, 52).length * 5;
  mDoc.setFontSize(7);
  h += mDoc.splitTextToSize(MENU.shop.tagline, 52).length * 3.2 + 3.2; // tagline + phone
  h += 5;  // divider + gap
  h += 4.5 + 3.5 + 3.5; // title + code + time
  if (cart.customerName) h += 3.5;
  h += 5;  // divider + gap

  for (const { line, desc } of validLines) {
    mDoc.setFontSize(8);
    h += mDoc.splitTextToSize(desc.item.name + ' x' + line.qty, 36).length * 4;
    mDoc.setFontSize(6.5);
    h += mDoc.splitTextToSize(desc.parts.join(' - '), 50).length * 3;
    if (desc.tops.length) h += mDoc.splitTextToSize('+ ' + desc.tops.join(', '), 50).length * 3;
    if (line.note) h += 3;
    h += 2.5; // gap giữa các món
  }

  h += 5;   // divider + gap
  h += 3.5 + 3.5; // tam tinh + tong
  if (disc > 0) h += 3.5;
  h += 5;   // divider + gap
  h += 3.5 + 3.2 + 3.5 + 8; // footer + bottom pad
  h = Math.ceil(h);

  // ── Pass 2: vẽ thực sự ─────────────────────────────────────────
  const doc = makePdfDoc('p', W, h);
  let y = 8;

  const divider = () => {
    doc.setLineWidth(0.2);
    doc.line(LX, y, RX, y);
    y += 3;
  };

  // Header
  doc.setFontSize(11);
  const shopLines = doc.splitTextToSize(MENU.shop.name, 52);
  doc.text(shopLines, CX, y, { align: 'center' });
  y += shopLines.length * 5;

  doc.setFontSize(7);
  const tagLines = doc.splitTextToSize(MENU.shop.tagline, 52);
  doc.text(tagLines, CX, y, { align: 'center' });
  y += tagLines.length * 3.2;
  doc.text('SDT: ' + MENU.shop.phone, CX, y, { align: 'center' });
  y += 3.5;

  divider();

  doc.setFontSize(9);
  doc.text('HOA DON', CX, y, { align: 'center' });
  y += 4.5;

  doc.setFontSize(7);
  doc.text('Ma: ' + cart.displayCode, LX, y);
  y += 3.5;
  doc.text('Gio: ' + dtStr, LX, y);
  y += 3.5;
  if (cart.customerName) {
    doc.text('Khach: ' + cart.customerName, LX, y);
    y += 3.5;
  }
  y += 1;
  divider();

  // Danh sách món
  for (const { line, desc } of validLines) {
    const linePrice = fmtPrice(calcLinePrice(line)) + 'd';

    doc.setFontSize(8);
    const nameWrapped = doc.splitTextToSize(desc.item.name + ' x' + line.qty, 36);
    doc.text(nameWrapped, LX, y);
    doc.text(linePrice, RX, y, { align: 'right' }); // giá căn phải theo dòng đầu tên
    y += nameWrapped.length * 4;

    doc.setFontSize(6.5);
    const optWrapped = doc.splitTextToSize(desc.parts.join(' - '), 50);
    doc.text(optWrapped, LX + 2, y);
    y += optWrapped.length * 3;

    if (desc.tops.length) {
      const topWrapped = doc.splitTextToSize('+ ' + desc.tops.join(', '), 50);
      doc.text(topWrapped, LX + 2, y);
      y += topWrapped.length * 3;
    }
    if (line.note) {
      doc.text('Ghi chu: ' + line.note, LX + 2, y, { maxWidth: 50 });
      y += 3;
    }
    y += 2.5;
  }

  divider();

  // Tổng tiền
  doc.setFontSize(7);
  doc.text('Tam tinh', LX, y);
  doc.text(fmtPrice(sub) + 'd', RX, y, { align: 'right' });
  y += 3.5;

  if (disc > 0) {
    doc.text('Giam gia', LX, y);
    doc.text('-' + fmtPrice(disc) + 'd', RX, y, { align: 'right' });
    y += 3.5;
  }

  doc.setFontSize(9);
  doc.text('TONG', LX, y);
  doc.text(fmtPrice(total) + 'd', RX, y, { align: 'right' });
  y += 5;

  divider();

  // Footer
  doc.setFontSize(7);
  doc.text('Cam on quy khach!', CX, y, { align: 'center' });
  y += 3.5;
  doc.setFontSize(6.5);
  doc.text('Wifi: ' + MENU.shop.wifi, CX, y, { align: 'center' });
  y += 3.2;
  doc.setFontSize(7);
  doc.text('Hen gap lai :)', CX, y, { align: 'center' });

  const uri = doc.output('datauristring');
  const ps = getPrintSettings();
  if (ps.receipt.mode === 'server' && ps.serverUrl && ps.receipt.printer) {
    await sendToPrintServer(uri, ps.serverUrl, ps.receipt.printer, 'HoaDon-' + cart.displayCode);
  } else {
    doc.autoPrint();
    triggerPdfIframe(doc.output('datauristring'), 'receiptPrintFrame');
  }
}

function allLinesBarPrinted(cart) {
  if (!cart || !cart.lines.length) return false;
  return cart.lines.every(l => l.barPrinted === true || !buildLineDescription(l));
}

// Helper dùng chung: load font Roboto TTF từ CDN, cache vào _barTicketFont
async function loadPdfFont() {
  if (_barTicketFont) return true;
  toast('Đang tải font lần đầu...');
  try {
    const resp = await fetch('https://cdnjs.cloudflare.com/ajax/libs/ink/3.1.10/fonts/Roboto/roboto-regular-webfont.ttf');
    const buf = await resp.arrayBuffer();
    const bytes = new Uint8Array(buf);
    let bin = '';
    for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
    _barTicketFont = btoa(bin);
    return true;
  } catch {
    toast('Không tải được font — kiểm tra kết nối mạng.');
    return false;
  }
}

// Helper: tạo jsPDF doc với font Roboto đã đăng ký
function makePdfDoc(orientation, w, h) {
  const doc = new (window.jspdf.jsPDF)(orientation, 'mm', [w, h]);
  doc.addFileToVFS('roboto.ttf', _barTicketFont);
  doc.addFont('roboto.ttf', 'roboto', 'normal');
  doc.setFont('roboto', 'normal');
  return doc;
}

async function printBarTicket(cart, mode) {
  if (!window.jspdf?.jsPDF) { toast('Thư viện PDF chưa tải xong, thử lại sau giây lát.'); return; }
  if (!await loadPdfFont()) return;

  // Nếu chưa rõ mode và có cả lines đã in lẫn chưa in → hỏi người dùng
  if (!mode) {
    const hasPrinted   = cart.lines.some(l => l.barPrinted && buildLineDescription(l));
    const hasUnprinted = cart.lines.some(l => !l.barPrinted && buildLineDescription(l));
    if (hasPrinted && hasUnprinted) {
      showChoiceDialog(
        'In phiếu pha chế',
        'Có món đã được in tem. Bạn muốn in thế nào?',
        [
          { label: 'In tất cả',        primary: false, action: () => printBarTicket(cart, 'all') },
          { label: 'Chỉ in món mới thêm', primary: true,  action: () => printBarTicket(cart, 'new') }
        ]
      );
      return;
    }
    mode = 'all';
  }

  // Lọc lines cần in
  const toPrint = mode === 'new'
    ? cart.lines.filter(l => !l.barPrinted)
    : cart.lines;

  let cupsToPrint = 0;
  for (const line of toPrint) if (buildLineDescription(line)) cupsToPrint += line.qty;
  if (!cupsToPrint) { toast('Không có món để in.'); return; }

  // Tổng ly toàn đơn và điểm bắt đầu đánh số
  let totalCupsAll = 0;
  for (const line of cart.lines) if (buildLineDescription(line)) totalCupsAll += line.qty;
  let pageIdxStart = 0;
  if (mode === 'new') {
    for (const line of cart.lines) {
      if (line.barPrinted && buildLineDescription(line)) pageIdxStart += line.qty;
    }
  }

  // Tạo PDF — mỗi ly 1 trang 50×30mm ngang
  const doc = makePdfDoc('l', 50, 30);

  let pageIdx = pageIdxStart;
  let firstPage = true;
  for (const line of toPrint) {
    const desc = buildLineDescription(line);
    if (!desc) continue;

    for (let q = 0; q < line.qty; q++) {
      if (!firstPage) doc.addPage([50, 30], 'l');
      firstPage = false;
      pageIdx++;

      const qLabel = line.qty > 1 ? ` (${q + 1}/${line.qty})` : '';
      doc.setFontSize(9.6);
      doc.text(2, 4, desc.item.name + qLabel, { maxWidth: 46 });

      doc.setLineWidth(0.25);
      doc.line(0, 7, 50, 7);

      const rows = [desc.parts.join(' - ')];
      if (desc.tops.length) rows.push('+ ' + desc.tops.join(', '));
      doc.setFontSize(7.2);
      doc.text(2, 10.5, rows.join('\n'), { maxWidth: 46 });

      if (line.note) {
        doc.setFontSize(7.2);
        doc.text(2, 21.5, 'Ghi chu: ' + line.note, { maxWidth: 46 });
      }

      doc.line(0, 24, 50, 24);

      doc.setFontSize(7.2);
      doc.text(2, 28.5, `${cart.displayCode}  *  ${pageIdx}/${totalCupsAll}  *  ${MENU.shop.phone}`);
    }
  }

  const uri = doc.output('datauristring');
  const ps = getPrintSettings();
  if (ps.barTicket.mode === 'server' && ps.serverUrl && ps.barTicket.printer) {
    await sendToPrintServer(uri, ps.serverUrl, ps.barTicket.printer, 'PhieuPhaChe-' + cart.displayCode);
  } else {
    doc.autoPrint();
    triggerPdfIframe(doc.output('datauristring'), 'barTicketPrintFrame');
  }

  // Đánh dấu đã in
  for (const line of toPrint) {
    if (buildLineDescription(line)) line.barPrinted = true;
  }
  saveState();
  renderCart();
}

async function printSingleLine(cart, lineIdx) {
  const line = cart.lines[lineIdx];
  if (!line || !buildLineDescription(line)) { toast('Không có thông tin món để in.'); return; }
  if (!window.jspdf?.jsPDF) { toast('Thư viện PDF chưa tải xong, thử lại sau giây lát.'); return; }
  if (!await loadPdfFont()) return;

  const desc = buildLineDescription(line);

  // Vị trí của dòng này trong toàn đơn
  let totalCupsAll = 0;
  for (const l of cart.lines) if (buildLineDescription(l)) totalCupsAll += l.qty;
  let lineStart = 0;
  for (let j = 0; j < lineIdx; j++) {
    if (buildLineDescription(cart.lines[j])) lineStart += cart.lines[j].qty;
  }

  const doc = makePdfDoc('l', 50, 30);

  for (let q = 0; q < line.qty; q++) {
    if (q > 0) doc.addPage([50, 30], 'l');
    const qLabel = line.qty > 1 ? ` (${q + 1}/${line.qty})` : '';
    doc.setFontSize(9.6);
    doc.text(2, 4, desc.item.name + qLabel, { maxWidth: 46 });
    doc.setLineWidth(0.25);
    doc.line(0, 7, 50, 7);
    const rows = [desc.parts.join(' - ')];
    if (desc.tops.length) rows.push('+ ' + desc.tops.join(', '));
    doc.setFontSize(7.2);
    doc.text(2, 10.5, rows.join('\n'), { maxWidth: 46 });
    if (line.note) {
      doc.setFontSize(7.2);
      doc.text(2, 21.5, 'Ghi chu: ' + line.note, { maxWidth: 46 });
    }
    doc.line(0, 24, 50, 24);
    doc.setFontSize(7.2);
    doc.text(2, 28.5, `${cart.displayCode}  *  ${lineStart + q + 1}/${totalCupsAll}  *  ${MENU.shop.phone}`);
  }

  const uri = doc.output('datauristring');
  const ps = getPrintSettings();
  if (ps.barTicket.mode === 'server' && ps.serverUrl && ps.barTicket.printer) {
    await sendToPrintServer(uri, ps.serverUrl, ps.barTicket.printer, 'PhieuPhaChe-' + cart.displayCode);
  } else {
    doc.autoPrint();
    triggerPdfIframe(doc.output('datauristring'), 'barTicketPrintFrame');
  }

  line.barPrinted = true;
  saveState();
  renderCart();
}

// ============== EVENT BINDING ==============
function bindEvents() {
  $('#ui-scale-down').addEventListener('click', () => {
    uiConfig.fontSize = Math.max(70, uiConfig.fontSize - 5);
    saveUiConfig(); applyUiConfig();
  });
  $('#ui-scale-reset').addEventListener('click', () => {
    uiConfig.fontSize = 100;
    saveUiConfig(); applyUiConfig();
  });
  $('#ui-scale-up').addEventListener('click', () => {
    uiConfig.fontSize = Math.min(130, uiConfig.fontSize + 5);
    saveUiConfig(); applyUiConfig();
  });

  $('#settings-view').addEventListener('click', handleSettingsEvent);
  ['dragstart','dragend','dragover','drop'].forEach(evt =>
    $('#settings-view').addEventListener(evt, handleSettingsDnD)
  );

  $$('.top-tab').forEach(b => {
    b.addEventListener('click', () => {
      state.view = b.dataset.view;
      $$('.top-tab').forEach(x => x.classList.toggle('active', x === b));
      renderAll();
    });
  });

  $('#order-filters').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-filter]');
    if (!b) return;
    state.orderFilter = b.dataset.filter;
    $$('#order-filters button').forEach(x => x.classList.toggle('active', x === b));

  });

    state.search = e.target.value;
    $('#topbar-search').classList.toggle('has-value', e.target.value.length > 0);
    renderMenu();
  });

  $('#search-clear').addEventListener('click', () => {
    const inp = $('#search-input');
    inp.value = '';
    state.search = '';
    $('#topbar-search').classList.remove('has-value');
    inp.focus();
    renderMenu();
  });

  $('#cat-nav').addEventListener('click', (e) => {
    const b = e.target.closest('button[data-cat]');
    if (!b) return;
    state.catFilter = b.dataset.cat || null;
    renderMenu();
  });

  $('#menu-content').addEventListener('click', (e) => {
    const card = e.target.closest('.item-card');
    if (!card) return;
    let cart = getActiveCart();
    if (!cart) cart = newCart();
    if (!isCartEditable(cart)) {
      const sizeTag = e.target.closest('.price-tag[data-size]');
      const itemId = card.dataset.item;
      const size = sizeTag ? sizeTag.dataset.size : undefined;
      if (cart.paid) {
        showChoiceDialog(
          'Đơn đã thanh toán',
          'Hệ thống sẽ tạo đơn mới cho món này.',
          [
            { label: 'Hủy bỏ',  primary: false, action: () => {} },
            { label: 'Đồng ý',  primary: true,  action: () => { newCart(); renderAll(); openItemModal(itemId, undefined, size); } }
          ]
        );
      } else {
        newCart();
        renderAll();
        toast('Đã tạo giỏ mới (giỏ cũ đã chốt)');
      }
      return;
    }
    const sizeTag = e.target.closest('.price-tag[data-size]');
    const itemId = card.dataset.item;
    const size = sizeTag ? sizeTag.dataset.size : undefined;
    if (allLinesBarPrinted(cart)) {
      showChoiceDialog(
        'Tất cả các món hiện tại đã IN TEM PHA CHẾ',
        'Bạn muốn tạo đơn mới hay thêm vào đơn hiện tại?',
        [
          { label: 'Tạo đơn mới', primary: false, action: () => { newCart(); renderAll(); openItemModal(itemId, undefined, size); } },
          { label: 'Thêm vào đơn hiện tại', primary: true, action: () => openItemModal(itemId, undefined, size) }
        ]
      );
      return;
    }
    openItemModal(itemId, undefined, size);

  $('#cart-tabs').addEventListener('click', (e) => {
    const pinBtn = e.target.closest('[data-pin]');
    if (pinBtn) { e.stopPropagation(); togglePin(pinBtn.dataset.pin); return; }
    const closeBtn = e.target.closest('[data-close]');
    if (closeBtn) { e.stopPropagation(); closeCart(closeBtn.dataset.close); return; }
    if (e.target.closest('#add-cart-btn')) {
      const emptyCart = state.carts.find(c => c.lines.length === 0 && !c.paid && !c.cancelled);
      if (emptyCart) {
        state.activeCartId = emptyCart.id;
        saveState();
        renderCart();
        requestAnimationFrame(() => {
          const tabEl = $(`[data-cart="${emptyCart.id}"]`);
          if (tabEl) {
            tabEl.classList.add('flashing');
            tabEl.addEventListener('animationend', () => tabEl.classList.remove('flashing'), { once: true });
          }
        });
      } else {
        newCart();
        renderAll();
      }
      return;
    }
    const tab = e.target.closest('[data-cart]');
    if (tab) {
      state.activeCartId = tab.dataset.cart;
      pendingRemoveIdx = null;
      saveState();
      renderCart();
    }
  });

  $('#cart-body').addEventListener('click', (e) => {
    const cart = getActiveCart();
    if (!cart) return;
    const confirmBtn = e.target.closest('[data-rm-confirm]');
    if (confirmBtn) {
      cart.lines.splice(parseInt(confirmBtn.dataset.rmConfirm), 1);
      pendingRemoveIdx = null;
      saveState(); renderCart();
      return;
    }
    const rmBtn = e.target.closest('[data-rm-line]');
    if (rmBtn) {
      pendingRemoveIdx = parseInt(rmBtn.dataset.rmLine);
      renderCart();
      return;
    }
    // Any other click clears pending confirm
    if (pendingRemoveIdx !== null) { pendingRemoveIdx = null; renderCart(); }
    const qtyBtn = e.target.closest('[data-line-qty]');
    if (qtyBtn) {
      const i = parseInt(qtyBtn.dataset.lineQty);
      const d = parseInt(qtyBtn.dataset.d);
      cart.lines[i].qty = Math.max(1, cart.lines[i].qty + d);
      saveState(); renderCart();
      return;
    }
    const editBtn = e.target.closest('[data-edit-line]');
    if (editBtn) {
      openItemModal(cart.lines[parseInt(editBtn.dataset.editLine)].itemId, parseInt(editBtn.dataset.editLine));
      return;
    }
    const printLineBtn = e.target.closest('[data-print-line]');
    if (printLineBtn) {
      printSingleLine(cart, parseInt(printLineBtn.dataset.printLine));
      return;
    }
  });

  $('#cart-body').addEventListener('input', (e) => {
    if (e.target.id === 'customer-name') {
      const cart = getActiveCart();
      if (cart) {
        cart.customerName = e.target.value;
        saveState();
        renderCartTabs();
      }
    }
  });

  $('#cart-footer').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (btn) handleCartAction(btn.dataset.act);
  });
  $('#cart-footer').addEventListener('input', (e) => {
    const cart = getActiveCart();
    if (!cart) return;
    if (e.target.id === 'discount-value') {
      cart.discount.value = Math.max(0, parseFloat(e.target.value) || 0);
      saveState(); renderCart();
    } else if (e.target.id === 'discount-type') {
      cart.discount.type = e.target.value;
      saveState(); renderCart();
    }
  });

  $('#modal-close').addEventListener('click', closeModal);
  $('#modal-cancel').addEventListener('click', closeModal);
  $('#item-modal').addEventListener('click', (e) => {
    if (e.target.id === 'item-modal') closeModal();
  });
  $('#choice-dialog-bg').addEventListener('click', (e) => {
    if (e.target.id === 'choice-dialog-bg') hideChoiceDialog();
  });
  $('#modal-add').addEventListener('click', commitModal);
  $('#modal-body').addEventListener('click', modalEvent);
  $('#modal-body').addEventListener('contextmenu', modalEvent);
  $('#modal-foot-qty').addEventListener('click', modalEvent);

  $('#order-list').addEventListener('click', (e) => {
    const card = e.target.closest('.order-card');
    if (!card) return;
    const oid = card.dataset.orderId;
    const order = [...state.carts, ...state.archived].find(c => c.id === oid);
    if (!order) return;
    if (state.carts.find(c => c.id === oid)) {
      // Switch to that cart
      state.activeCartId = oid;
      state.view = 'order';
      $$('.top-tab').forEach(x => x.classList.toggle('active', x.dataset.view === 'order'));
      saveState();
      renderAll();
    } else {
      const action = prompt(
        `Đơn ${order.displayCode} - ${STATUS_META[deriveStatus(order)].label}\nTổng: ${fmtPrice(calcCartTotal(order))}đ\n\nNhập:\n  "in" - in lại hóa đơn\n  "bar" - in phiếu pha chế`
      );
      if (action === 'in') printReceipt(order);
      else if (action === 'bar') printBarTicket(order);
    }
  });

  // === MOBILE-SPECIFIC EVENTS ===

  $('#cart-body').addEventListener('click', (e) => {
    // Mobile category filter buttons
    const catBtn = e.target.closest('.cat-nav-mobile button[data-cat]');
    if (catBtn) {
      state.catFilter = catBtn.dataset.cat || null;
      // Update active state
      const buttons = catBtn.parentElement.querySelectorAll('button');
      buttons.forEach(b => b.classList.toggle('active', b === catBtn));
      // Rebuild content portion only
      const contentEl = $('#cart-body .mobile-menu-content');
      if (contentEl) {
        const tmp = document.createElement('div');
        tmp.innerHTML = buildMobileMenuHtml();
        const newContent = tmp.querySelector('.mobile-menu-content');
        if (newContent) contentEl.replaceWith(newContent);
      }
      return;
    }
    // Item card click
    const card = e.target.closest('.item-card');
    if (!card) return;
    let cart = getActiveCart();
    if (!cart) cart = newCart();
    if (!isCartEditable(cart)) {
      const sizeTag = e.target.closest('.price-tag[data-size]');
      const itemId = card.dataset.item;
      const size = sizeTag ? sizeTag.dataset.size : undefined;
      if (cart.paid) {
        showChoiceDialog(
          'Đơn đã thanh toán',
          'Hệ thống sẽ tạo đơn mới cho món này.',
          [
            { label: 'Hủy bỏ',  primary: false, action: () => {} },
            { label: 'Đồng ý',  primary: true,  action: () => { newCart(); renderAll(); openItemModal(itemId, undefined, size); } }
          ]
        );
      } else {
        newCart();
        renderAll();
        toast('Đã tạo giỏ mới (giỏ cũ đã chốt)');
      }
      return;
    }
    const sizeTag = e.target.closest('.price-tag[data-size]');
    const itemId = card.dataset.item;
    const size = sizeTag ? sizeTag.dataset.size : undefined;
    if (allLinesBarPrinted(cart)) {
      showChoiceDialog(
        'Tất cả các món hiện tại đã IN TEM PHA CHẾ',
        'Bạn muốn tạo đơn mới hay thêm vào đơn hiện tại?',
        [
          { label: 'Tạo đơn mới', primary: false, action: () => { newCart(); renderAll(); openItemModal(itemId, undefined, size); } },
          { label: 'Thêm vào đơn hiện tại', primary: true, action: () => openItemModal(itemId, undefined, size) }
        ]
      );
      return;
    }
    openItemModal(itemId, undefined, size);
  });

  // Mobile pay button -> expand detail panel
  $('#mobile-pay-btn').addEventListener('click', () => {
    if ($('#mobile-pay-btn').disabled) return;
    expandMobileDetail();
  });

  // Mobile collapse button -> hide detail panel
  $('#mobile-collapse-btn').addEventListener('click', collapseMobileDetail);

  // Mobile detail panel events (lines, qty, edit, customer name)
  function bindCartLineEvents(rootSelector) {
    const root = $(rootSelector);
    if (!root) return;
    root.addEventListener('click', (e) => {
      const cart = getActiveCart();
      if (!cart) return;
      const confirmBtn = e.target.closest('[data-rm-confirm]');
      if (confirmBtn) {
        cart.lines.splice(parseInt(confirmBtn.dataset.rmConfirm), 1);
        pendingRemoveIdx = null;
        saveState(); renderCart();
        return;
      }
      const rmBtn = e.target.closest('[data-rm-line]');
      if (rmBtn) {
        pendingRemoveIdx = parseInt(rmBtn.dataset.rmLine);
        renderCart();
        return;
      }
      // Any other click clears pending confirm
      if (pendingRemoveIdx !== null) { pendingRemoveIdx = null; renderCart(); }
      const qtyBtn = e.target.closest('[data-line-qty]');
      if (qtyBtn) {
        const i = parseInt(qtyBtn.dataset.lineQty);
        const d = parseInt(qtyBtn.dataset.d);
        cart.lines[i].qty = Math.max(1, cart.lines[i].qty + d);
        saveState(); renderCart();
        return;
      }
      const editBtn = e.target.closest('[data-edit-line]');
      if (editBtn) {
        openItemModal(cart.lines[parseInt(editBtn.dataset.editLine)].itemId, parseInt(editBtn.dataset.editLine));
      }
    });
    root.addEventListener('input', (e) => {
      if (e.target.id === 'customer-name') {
        const cart = getActiveCart();
        if (cart) {
          cart.customerName = e.target.value;
          saveState();
          renderCartTabs();
        }
      }
    });
  }
  bindCartLineEvents('#mobile-detail-content');

  // Mobile detail footer events (action buttons + discount)
  $('#mobile-detail-footer').addEventListener('click', (e) => {
    const btn = e.target.closest('[data-act]');
    if (btn) handleCartAction(btn.dataset.act);
  });
  $('#mobile-detail-footer').addEventListener('input', (e) => {
    const cart = getActiveCart();
    if (!cart) return;
    if (e.target.id === 'discount-value') {
      cart.discount.value = Math.max(0, parseFloat(e.target.value) || 0);
      saveState(); renderCart();
    } else if (e.target.id === 'discount-type') {
      cart.discount.type = e.target.value;
      saveState(); renderCart();
    }
  });

  // Re-render on viewport changes (rotation, dev tools toggle)
  window.addEventListener('resize', () => {
    clearTimeout(window._resizeTimer);
    window._resizeTimer = setTimeout(() => renderAll(), 150);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (state.activeCartId && state.mobileDetailExpanded.has(state.activeCartId)) {
        collapseMobileDetail();
        return;
      }
      closeModal();
    }
  });
}

// ============== INIT ==============
async function init() {
  try {
    const res = await loadMenu();
    PRICE_UNIT = (MENU.shop && MENU.shop.priceUnit) || 1000;
    if (res.source === 'embedded') {
      const banner = document.createElement('div');
      banner.className = 'menu-error';
      banner.innerHTML = '<strong>⚠ Đang dùng menu nhúng (mặc định)</strong>Không tải được file <code>menu.json</code> - có thể do mở file trực tiếp (file://) thay vì qua HTTP server. Để chỉnh menu, hãy chạy qua local server (vd: <code>python -m http.server</code>) hoặc edit phần JSON cuối file HTML.';
      $('#menu-panel').insertBefore(banner, $('.cat-nav-row'));
    }
  } catch (e) {
    document.body.innerHTML = '<div style="padding:40px;text-align:center"><h2>Lỗi tải menu</h2><p>' + escHtml(e.message) + '</p></div>';
    return;
  }

  loadUiConfig();
  loadState();
  // Migrate old state if needed: ensure displayCode exists
  for (const c of state.carts) {
    if (!c.displayCode) c.displayCode = genDisplayCode();
    if (typeof c.paid !== 'boolean') c.paid = false;
    if (typeof c.delivered !== 'boolean') c.delivered = false;
    if (typeof c.cancelled !== 'boolean') c.cancelled = false;
    if (typeof c.pinned !== 'boolean') c.pinned = false;
    for (const l of (c.lines || [])) {
      if (typeof l.barPrinted !== 'boolean') l.barPrinted = false;
    }
  }
  for (const c of state.archived) {
    if (!c.displayCode) c.displayCode = genDisplayCode();
    for (const l of (c.lines || [])) {
      if (typeof l.barPrinted !== 'boolean') l.barPrinted = false;
    }
  }

  bindEvents();
  renderAll();
  applyUiConfig();
  initResizer();
}

init();
})();
</script>
