<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHABAR — Order System</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root {
  --bg: #FAF6E8;
  --bg-2: #F2EBD0;
  --surface: #FFFFFF;
  --surface-2: #FFFDF5;
  --ink: #1A1A1A;
  --ink-2: #4A4A4A;
  --muted: #8A8A8A;
  --line: #E8E2C8;
  --line-strong: #D4CCAA;
  --accent: #1E3A8A;
  --accent-hover: #15296b;
  --accent-2: #FFE574;
  --hot: #E85D2F;
  --new: #D63838;
  --ok: #2D8659;
  --warn: #C77B1A;
  --danger: #C0392B;
  --pin: #D97706;
  --shadow-sm: 0 1px 2px rgba(26,26,26,0.06);
  --shadow: 0 2px 8px rgba(26,26,26,0.08);
  --shadow-lg: 0 8px 24px rgba(26,26,26,0.12);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Be Vietnam Pro', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  color: inherit;
  font-size: inherit;
}

input, select, textarea {
  font-family: inherit;
  font-size: inherit;
}

/* === LAYOUT === */
.app {
  display: grid;
  grid-template-columns: 1fr 6px var(--cart-width, 420px);
  grid-template-rows: 56px 1fr;
  height: 100vh;
}

.panel-resizer {
  grid-column: 2;
  grid-row: 2;
  background: var(--line);
  cursor: col-resize;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
  z-index: 8;
  position: relative;
}
.panel-resizer:hover,
.panel-resizer.dragging { background: var(--accent); }
.panel-resizer-handle {
  width: 16px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
  box-shadow: var(--shadow-sm);
  transition: border-color 0.15s, box-shadow 0.15s;
  flex-direction: column;
  gap: 3px;
}
.panel-resizer:hover .panel-resizer-handle,
.panel-resizer.dragging .panel-resizer-handle {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}
.panel-resizer-handle span {
  display: block;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--muted);
}
.panel-resizer.dragging .panel-resizer-handle span { background: var(--accent); }

.topbar {
  grid-column: 1 / -1;
  background: var(--accent);
  color: #fff;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  box-shadow: var(--shadow);
  z-index: 10;
  position: relative;
}
.topbar .logo {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 22px;
  letter-spacing: -0.5px;
}
.topbar .logo .accent { color: var(--accent-2); }
.topbar .tagline { font-size: 12px; color: rgba(255,255,255,0.7); margin-left: -8px; }
.topbar .spacer { flex: 1; }
.topbar .top-tabs { display: flex; gap: 4px; }

.topbar-search {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 33.333%;
  display: flex;
  align-items: center;
}
.topbar-search input {
  width: 100%;
  padding: 7px 30px 7px 30px;
  border: 1.5px solid rgba(255,255,255,0.2);
  border-radius: var(--radius);
  background: rgba(255,255,255,0.12);
  color: #fff;
  outline: none;
  font-size: 13px;
  transition: border-color 0.15s, background 0.15s;
}
.topbar-search input::placeholder { color: rgba(255,255,255,0.5); }
.topbar-search input:focus {
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.18);
}
.topbar-search .search-icon {
  position: absolute;
  left: 9px;
  font-size: 13px;
  pointer-events: none;
  line-height: 1;
  opacity: 0.8;
}
.topbar-search .search-clear {
  position: absolute;
  right: 6px;
  display: none;
  background: none;
  border: none;
  color: rgba(255,255,255,0.7);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  padding: 2px 5px;
  line-height: 1;
  border-radius: 4px;
  transition: color 0.1s;
}
.topbar-search .search-clear:hover { color: #fff; }
.topbar-search.has-value .search-icon { display: none; }
.topbar-search.has-value .search-clear { display: block; }
.topbar .top-tab {
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
  color: rgba(255,255,255,0.7);
  transition: all 0.15s;
}
.topbar .top-tab:hover { background: rgba(255,255,255,0.08); color: #fff; }
.topbar .top-tab.active { background: var(--accent-2); color: var(--ink); }
.topbar .top-tab .badge {
  display: inline-block;
  background: rgba(0,0,0,0.15);
  font-size: 11px;
  padding: 1px 6px;
  border-radius: 10px;
  margin-left: 4px;
  font-weight: 700;
}

.menu-panel {
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
#menu-content {
  flex: 1;
  overflow-y: auto;
  padding: 0 20px 80px;
}

.cart-panel {
  background: var(--surface);
  border-left: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* === MENU PANEL === */
.cat-nav-row {
  display: flex;
  align-items: center;
  flex-shrink: 0;
  padding: 10px 12px 10px 20px;
  border-bottom: 1px solid var(--line);
  gap: 6px;
}
.cat-nav {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  flex: 1;
}
.ui-scale-btns {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
}
.ui-scale-btn {
  width: 26px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--ink-2);
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  line-height: 1;
  user-select: none;
}
.ui-scale-btn:hover { border-color: var(--accent); color: var(--accent); }
.ui-scale-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.cat-nav button {
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  transition: all 0.15s;
}
.cat-nav button:hover { border-color: var(--accent); }
.cat-nav button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.category { margin-bottom: 28px; }
.category h2 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.category h2::before {
  content: '';
  width: 4px;
  height: 18px;
  background: var(--accent-2);
  border-radius: 2px;
}

.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
}

.item-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 12px;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
  gap: 8px;
  text-align: left;
  position: relative;
}
.item-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
  transform: translateY(-1px);
}
.item-card .name {
  font-weight: 600;
  font-size: 13px;
  line-height: 1.35;
}
.item-card .price-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.item-card .price-tag {
  font-size: 11px;
  background: var(--bg-2);
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
  color: var(--ink-2);
}
.item-card .badges {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  gap: 4px;
}
.badge-hot, .badge-new {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 6px;
  border-radius: 3px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #fff;
}
.badge-hot { background: var(--hot); }
.badge-new { background: var(--new); }

/* === CART PANEL === */
.cart-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 0;
  border-bottom: 1px solid var(--line);
  padding: 8px 8px 0;
  background: var(--bg-2);
  min-height: 44px;
  align-items: flex-end;
}
.cart-tab {
  padding: 8px 10px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  border: 1px solid transparent;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-right: 2px;
  transition: all 0.15s;
}
.cart-tab:hover { background: var(--surface-2); color: var(--ink); }
.cart-tab.active {
  background: var(--surface);
  color: var(--ink);
  border-color: var(--line);
  border-bottom-color: var(--surface);
  margin-bottom: -1px;
}
.cart-tab .pin {
  font-size: 12px;
  padding: 2px 4px;
  border-radius: 3px;
  color: var(--muted);
  transition: all 0.15s;
}
.cart-tab .pin.active { color: var(--pin); }
.cart-tab .pin:hover { background: rgba(217,119,6,0.15); }
.cart-tab .close {
  font-size: 16px;
  line-height: 1;
  padding: 2px 4px;
  border-radius: 3px;
  color: var(--muted);
}
.cart-tab .close:hover { background: rgba(0,0,0,0.1); color: var(--danger); }
.cart-tab .close.disabled { opacity: 0.3; cursor: not-allowed; }
.cart-tab.paid > span:not(.pin):not(.close) { font-weight: 800; color: var(--ok); }
.cart-tab.paid.active > span:not(.pin):not(.close) { color: var(--ok); }
@keyframes tab-flash {
  0%,100% { background: var(--surface); }
  30%      { background: var(--accent-2); color: var(--ink); }
  60%      { background: var(--surface); }
}
.cart-tab.flashing { animation: tab-flash 0.5s ease 2; }
.cart-tab.add-cart {
  background: var(--accent);
  color: #fff;
  font-size: 18px;
  padding: 6px 12px;
  border-radius: 6px 6px 0 0;
}
.cart-tab.add-cart:hover { background: var(--accent-hover); color: #fff; }

.cart-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--line);
}
.cart-id {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 16px;
  letter-spacing: 0.5px;
}
.cart-status {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.status-draft        { background: var(--bg-2);  color: var(--ink-2); }
.status-paid         { background: #DBEAFE;      color: #1E40AF; }
.status-delivered    { background: #FEF3C7;      color: var(--warn); }
.status-completed    { background: #D1FAE5;      color: var(--ok); }
.status-cancelled    { background: #FEE2E2;      color: var(--danger); }

/* Flag indicators (sub-badges showing which flag is set) */
.flag-row {
  display: flex;
  gap: 4px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.flag-chip {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 6px;
  border-radius: 3px;
  background: var(--bg-2);
  color: var(--muted);
  border: 1px solid var(--line);
}
.flag-chip.on {
  background: #D1FAE5;
  color: var(--ok);
  border-color: #86EFAC;
}

.cart-customer {
  margin-bottom: 12px;
}
.cart-customer input {
  width: 100%;
  padding: 6px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface-2);
  font-size: 12px;
}

.line {
  background: var(--surface-2);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 10px;
  margin-bottom: 8px;
  position: relative;
}
.line .line-name {
  font-weight: 600;
  font-size: 13px;
  margin-bottom: 4px;
  padding-right: 26px;
}
.line .line-meta {
  font-size: 11px;
  color: var(--ink-2);
  margin-bottom: 4px;
  line-height: 1.5;
}
.line .line-toppings {
  font-size: 11px;
  color: var(--ink-2);
  font-style: italic;
}
.line .line-bottom {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}
.qty-ctl {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 2px;
}
.qty-ctl button {
  width: 22px;
  height: 22px;
  border-radius: 3px;
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
}
.qty-ctl button:hover { background: var(--bg-2); }
.qty-ctl span {
  min-width: 22px;
  text-align: center;
  font-weight: 600;
  font-size: 13px;
}
.line-price {
  flex: 1;
  text-align: center;
  font-size: 13px;
  color: var(--ink-2);
}
.line-total {
  flex-shrink: 0;
  font-weight: 700;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 14px;
}
.line-remove {
  position: absolute;
  top: 6px;
  right: 6px;
  width: 22px;
  height: 22px;
  border-radius: 4px;
  color: var(--muted);
  font-size: 16px;
  line-height: 1;
}
.line-remove:hover { background: #FEE2E2; color: var(--danger); }
.line-remove-confirm {
  position: absolute;
  top: 2px;
  right: 2px;
  width: 40px;
  height: 40px;
  border-radius: var(--radius-sm);
  background: var(--danger);
  color: #fff;
  font-size: 20px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.line-edit {
  font-size: 11px;
  color: var(--accent);
  text-decoration: underline;
}
.line-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
  flex-wrap: wrap;
}
.line-print-btn {
  font-size: 11px;
  color: var(--ok);
  text-decoration: underline;
}
.bar-printed-badge {
  font-size: 10px;
  color: var(--ok);
  background: #E8F5F0;
  border-radius: 3px;
  padding: 1px 6px;
  font-weight: 600;
  letter-spacing: .2px;
}
#choice-dialog-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
#choice-dialog-bg.show { display: flex; }
.choice-dialog {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 380px;
  box-shadow: var(--shadow-lg);
  padding: 24px 20px 18px;
  text-align: center;
}
.choice-dialog h4 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
  line-height: 1.35;
}
.choice-dialog p {
  font-size: 13px;
  color: var(--ink-2);
  margin-bottom: 20px;
  line-height: 1.5;
}
.choice-dialog-btns {
  display: flex;
  gap: 10px;
  justify-content: center;
  flex-wrap: wrap;
}

.empty-cart {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
  font-size: 13px;
  line-height: 1.6;
}

.cart-footer {
  border-top: 1px solid var(--line);
  padding: 12px;
  background: var(--surface-2);
}
.totals { margin-bottom: 10px; }
.totals .total-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-bottom: 4px;
  color: var(--ink-2);
}
.totals .total-row.grand {
  font-size: 17px;
  font-weight: 700;
  font-family: 'Bricolage Grotesque', sans-serif;
  color: var(--ink);
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--line);
}
.totals .total-row.grand .val { color: var(--accent); }

.discount-row {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  font-size: 12px;
  align-items: center;
}
.discount-row label { color: var(--ink-2); white-space: nowrap; }
.discount-row input {
  width: 90px;
  padding: 4px 8px;
  border: 1px solid var(--line);
  border-radius: 4px;
  text-align: right;
  font-size: 12px;
}
.discount-row select {
  padding: 4px 6px;
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: 12px;
  background: var(--surface);
}

.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 6px;
}
.action-row.full { grid-template-columns: 1fr; }
.btn {
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 13px;
  border: 1.5px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-flag { background: var(--surface); color: var(--ink); border-color: var(--line-strong); }
.btn-flag:hover { background: var(--bg-2); border-color: var(--accent); }
.btn-flag.on {
  background: var(--ok);
  color: #fff;
  border-color: var(--ok);
}
.btn-flag.on:hover { background: #226843; border-color: #226843; }
.btn-secondary { background: var(--surface); color: var(--ink); border-color: var(--line-strong); }
.btn-secondary:hover { background: var(--bg-2); }
.btn-danger-outline { background: var(--surface); color: var(--danger); border-color: #FCA5A5; }
.btn-danger-outline:hover { background: #FEE2E2; }
.btn-ghost { background: transparent; color: var(--ink-2); }
.btn-ghost:hover { background: var(--bg-2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* === ORDERS LIST VIEW === */
.orders-view {
  position: absolute;
  inset: 56px 0 0 0;
  background: var(--bg);
  z-index: 5;
  overflow-y: auto;
  padding: 20px;
  display: none;
}
.orders-view.show { display: block; }
.orders-view h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  margin-bottom: 16px;
}
.order-filters {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.order-filters button {
  padding: 6px 12px;
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 999px;
  font-size: 12px;
  font-weight: 600;
}
.order-filters button.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

.order-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.order-card {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.order-card:hover {
  border-color: var(--accent);
  box-shadow: var(--shadow);
}
.order-card .head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.order-card .oid {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.order-card .meta {
  font-size: 11px;
  color: var(--muted);
  margin-bottom: 8px;
}
.order-card .lines-summary {
  font-size: 12px;
  color: var(--ink-2);
  line-height: 1.5;
  margin-bottom: 8px;
}
.order-card .total {
  font-weight: 700;
  font-family: 'Bricolage Grotesque', sans-serif;
  color: var(--accent);
  font-size: 16px;
}

/* === MODAL === */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.show { display: flex; }
.modal {
  background: var(--surface);
  border-radius: var(--radius);
  width: 100%;
  max-width: 560px;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-lg);
  overflow: hidden;
}
.modal-head {
  padding: 16px 20px;
  border-bottom: 1px solid var(--line);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-head h3 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 18px;
  font-weight: 700;
}
.modal-head button {
  width: 30px;
  height: 30px;
  border-radius: 4px;
  font-size: 20px;
  color: var(--muted);
}
.modal-head button:hover { background: var(--bg-2); color: var(--ink); }
.modal-body {
  padding: 16px 20px;
  overflow-y: auto;
  flex: 1;
}
.modal-foot {
  padding: 10px 14px;
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface-2);
}
.modal-foot-qty {
  display: flex;
  align-items: center;
  gap: 2px;
  flex-shrink: 0;
}
.modal-foot-qty button {
  width: 32px;
  height: 32px;
  font-size: 18px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal-foot-qty button:hover { border-color: var(--accent); }
.modal-foot-qty span {
  min-width: 28px;
  text-align: center;
  font-size: 15px;
  font-weight: 700;
}
.modal-foot-price {
  flex: 1;
  text-align: center;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--accent);
}
.modal-foot-actions {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.opt-section { margin-bottom: 16px; }
.opt-section h4 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 8px;
}
.opt-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.opt-chip {
  padding: 8px 14px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 13px;
  font-weight: 600;
  background: var(--surface);
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.opt-chip:hover { border-color: var(--accent); }
.opt-chip.selected {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}
.opt-chip .delta {
  font-size: 11px;
  opacity: 0.8;
}

.topping-group-section {
  margin-bottom: 14px;
}
.topping-group-section h5 {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-2);
  margin-bottom: 6px;
  padding-bottom: 4px;
  border-bottom: 1px dashed var(--line);
}
.topping-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.topping-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  background: var(--surface);
  transition: all 0.15s;
  cursor: pointer;
  font-size: 12px;
}
.topping-item:hover { border-color: var(--accent); }
.topping-item.selected {
  border-color: var(--accent);
  background: #EBF0FB;
}
.topping-item .name { font-weight: 500; }
.topping-item .price {
  font-weight: 700;
  color: var(--accent);
  font-size: 11px;
}
.topping-help {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}

.qty-section {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg-2);
  padding: 12px 16px;
  border-radius: var(--radius);
  margin-bottom: 16px;
}
.qty-section .label { font-weight: 600; }
.qty-section .qty-ctl button { width: 32px; height: 32px; font-size: 18px; }
.qty-section .qty-ctl span { min-width: 30px; font-size: 16px; }

.note-input {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 13px;
  resize: vertical;
  min-height: 50px;
}

.subtotal-display {
  background: var(--bg-2);
  padding: 12px 16px;
  border-radius: var(--radius);
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 8px;
}
.subtotal-display .val {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 22px;
  color: var(--accent);
}

/* === TOAST === */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #fff;
  padding: 10px 20px;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  transition: all 0.2s;
  z-index: 200;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* === MENU LOAD WARNING === */
.menu-error {
  background: #FEF3C7;
  border: 1px solid #FDE68A;
  color: #92400E;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  margin-bottom: 12px;
  font-size: 12px;
  line-height: 1.5;
}
.menu-error strong { display: block; margin-bottom: 2px; }
.menu-error code {
  background: rgba(0,0,0,0.08);
  padding: 1px 4px;
  border-radius: 3px;
  font-family: ui-monospace, monospace;
}

/* === SCROLLBARS === */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-strong); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* === RESPONSIVE === */
@media (max-width: 1024px) {
  .app { grid-template-columns: 1fr 6px var(--cart-width, 340px); }
}
@media (max-width: 768px) {
  .panel-resizer { display: none; }
}

/* Mobile-only summary bar - hidden by default (desktop) */
.mobile-summary {
  display: none;
}

/* Mobile-only collapse button - hidden by default */
.mobile-collapse-btn {
  display: none;
}

/* ============== MOBILE LAYOUT (≤ 768px) ============== */
@media (max-width: 768px) {
  html, body { overflow: hidden; }

  /* Top-level grid: topbar + main */
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: 56px 1fr;
    height: 100vh;
    height: 100dvh;
  }
  .panel-resizer { display: none; }

  .topbar { padding: 0 12px; gap: 8px; }
  .topbar .tagline { display: none; }
  .topbar .spacer { display: none; }
  .topbar .top-tab { padding: 6px 10px; font-size: 12px; }
  .topbar-search {
    position: static;
    transform: none;
    width: auto;
    flex: 1;
    min-width: 0;
  }
  .topbar-search input { font-size: 12px; padding: 6px 28px 6px 28px; }

  /* Hide the desktop menu panel entirely — we use cart-body for menu on mobile */
  .menu-panel { display: none; }

  /* Cart panel takes the full viewport below topbar.
     Internal grid keeps tabs at top, body in middle (scrollable),
     summary fixed at bottom WITHOUT position:fixed. */
  .cart-panel {
    position: static;
    border-left: none;
    width: auto;
    max-width: none;
    transform: none;
    transition: none;
    box-shadow: none;
    grid-column: 1 / -1;
    display: grid;
    grid-template-rows: auto 1fr auto;
    overflow: hidden;
    min-height: 0;
  }

  /* Cart tabs: wrap multiple lines, don't scroll horizontally */
  .cart-tabs {
    overflow-x: visible;
    flex-wrap: wrap;
    padding: 6px 6px 0;
    gap: 4px 2px;
    min-height: auto;
    align-items: center;
  }
  .cart-tab {
    font-size: 11px;
    padding: 6px 8px;
  }
  .cart-tab.active { margin-bottom: 0; border-bottom-color: var(--line); }

  /* Cart body = scrollable middle area. Either holds the mobile menu (draft)
     or is empty (when cart is non-draft and detail panel is always-on). */
  .cart-body {
    padding: 0;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
  }

  /* === Mobile menu inside cart-body === */
  .mobile-menu-area {
    padding: 0;
  }
  /* Sticky search + categories at top of menu scroll area */
  .mobile-menu-toolbar {
    position: sticky;
    top: 0;
    z-index: 3;
    background: var(--bg);
    padding: 10px 12px 8px;
    border-bottom: 1px solid var(--line);
  }
  .mobile-menu-toolbar .cat-nav-mobile {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin: 0;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .mobile-menu-toolbar .cat-nav-mobile::-webkit-scrollbar { display: none; }
  .mobile-menu-toolbar .cat-nav-mobile button {
    padding: 5px 11px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .mobile-menu-toolbar .cat-nav-mobile button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .mobile-menu-content {
    padding: 12px;
    padding-bottom: 24px;
  }
  .mobile-menu-content .category h2 { font-size: 16px; }
  .mobile-menu-content .items-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .mobile-menu-content .item-card {
    padding: 10px;
    gap: 6px;
  }
  .mobile-menu-content .item-card .name { font-size: 12px; }
  .mobile-menu-content .item-card .price-tag {
    font-size: 10px;
    padding: 1px 6px;
  }

  /* === Mobile summary bar (the 3rd grid row of cart-panel) === */
  .mobile-summary {
    display: block;
    background: var(--surface);
    border-top: 1px solid var(--line);
    box-shadow: 0 -2px 8px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .mobile-summary-lines {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px 12px 8px;
    max-height: 86px;
    overflow-y: auto;
    border-bottom: 1px solid var(--line);
  }
  .mobile-summary-lines:empty {
    display: none;
  }
  .summary-label {
    display: inline-flex;
    align-items: center;
    align-self: center;
    padding: 3px 9px;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .summary-chip {
    display: inline-flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0 4px;
    padding: 4px 12px;
    background: var(--surface-2);
    border: 1.5px solid var(--line);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-2);
    max-width: 100%;
    word-break: break-word;
  }
  .summary-chip .qty {
    color: var(--hot);
    font-weight: 700;
  }

  .mobile-pay-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: calc(100% - 24px);
    margin: 10px 12px 14px;
    padding: 14px 18px;
    background: var(--accent);
    color: #fff;
    border-radius: 999px;
    font-weight: 700;
    font-size: 15px;
    box-shadow: var(--shadow);
    transition: all 0.15s;
  }
  .mobile-pay-btn:active { transform: scale(0.98); }
  .mobile-pay-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
  }
  .mobile-pay-btn .left {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .mobile-pay-btn .icon { font-size: 18px; }
  .mobile-pay-btn .total {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 17px;
    letter-spacing: 0.3px;
  }

  /* When there's no cart or summary should be hidden (e.g. cart non-draft) */
  .mobile-summary.hidden { display: none; }

  /* === Mobile detail panel (slides up over menu+summary) === */
  .mobile-detail-panel {
    position: fixed;
    left: 0; right: 0;
    bottom: 0;
    top: calc(56px + var(--cart-tabs-h, 50px));
    background: var(--surface);
    z-index: 40;
    transform: translateY(100%);
    transition: transform 0.25s ease-out;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
  }
  .mobile-detail-panel.expanded {
    transform: translateY(0);
  }
  /* Suppress animation during programmatic tab switches */
  .mobile-detail-panel.no-transition {
    transition: none;
  }
  /* When cart is non-draft, panel is permanently expanded (replaces menu entirely) */
  .mobile-detail-panel.always-on {
    transform: translateY(0);
    transition: none;
    z-index: 5;
    box-shadow: none;
  }

  .mobile-collapse-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 28px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    color: var(--ink-2);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    flex-shrink: 0;
  }
  .mobile-collapse-btn:hover { background: var(--line); }
  .mobile-collapse-btn::before {
    content: '⌄';
    font-weight: 700;
    margin-right: 6px;
    font-size: 16px;
    line-height: 1;
  }
  .mobile-detail-panel.always-on .mobile-collapse-btn {
    display: none;
  }

  .mobile-detail-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px;
    padding-bottom: 16px;
    min-height: 0;
  }
  .mobile-detail-footer {
    flex-shrink: 0;
    border-top: 1px solid var(--line);
    padding: 10px 12px 14px;
    background: var(--surface-2);
  }

  /* Modal: smaller padding on mobile */
  .modal-bg { padding: 12px; }
  .modal { max-height: 92vh; }
  .modal-body { padding: 12px 16px; }

  /* Hide desktop cart footer on mobile */
  .cart-panel > .cart-footer {
    display: none;
  }

  /* Orders view: 1 column */
  .order-list { grid-template-columns: 1fr; }
}

/* === PRINT — K80 (80mm receipt) === */
@media print {
  @page { size: 80mm auto; margin: 0; }
  body * { visibility: hidden; }
  #print-area, #print-area * { visibility: visible; }
  #print-area {
    position: fixed;
    top: 0; left: 0;
    width: 80mm;
    padding: 4mm 4mm 8mm;
    font-family: 'Be Vietnam Pro', monospace;
    font-size: 11pt;
    color: #000;
    background: #fff;
    line-height: 1.4;
  }
  #print-area .r-header { text-align: center; margin-bottom: 4mm; }
  #print-area .r-shop {
    font-family: 'Bricolage Grotesque', sans-serif;
    font-size: 18pt;
    font-weight: 800;
    letter-spacing: 1px;
  }
  #print-area .r-tagline { font-size: 9pt; }
  #print-area .r-meta { font-size: 9pt; margin-bottom: 1mm; }
  #print-area .r-divider {
    border-top: 1px dashed #000;
    margin: 2mm 0;
  }
  #print-area .r-title {
    text-align: center;
    font-weight: 700;
    font-size: 13pt;
    margin: 2mm 0;
  }
  #print-area .r-line { margin-bottom: 2mm; }
  #print-area .r-line-head {
    display: flex;
    justify-content: space-between;
    font-weight: 700;
  }
  #print-area .r-line-detail {
    font-size: 9pt;
    padding-left: 2mm;
  }
  #print-area .r-totals { margin-top: 2mm; }
  #print-area .r-total-row {
    display: flex;
    justify-content: space-between;
    margin-bottom: 1mm;
  }
  #print-area .r-total-row.grand {
    font-weight: 800;
    font-size: 14pt;
    margin-top: 2mm;
    padding-top: 2mm;
    border-top: 1px solid #000;
  }
  #print-area .r-footer {
    text-align: center;
    margin-top: 4mm;
    font-size: 9pt;
  }
  #print-area .r-bar-item {
    margin-bottom: 3mm;
    padding: 2mm;
    border: 1px solid #000;
    border-radius: 2mm;
  }
  #print-area .r-bar-item .name {
    font-weight: 800;
    font-size: 13pt;
  }
  #print-area .r-bar-item .detail {
    font-size: 10pt;
    margin-top: 1mm;
  }
}
#print-area { display: none; }
@media print { #print-area { display: block; } }

/* === SETTINGS VIEW === */
.settings-view {
  position: absolute;
  inset: 56px 0 0 0;
  background: var(--bg);
  overflow-y: auto;
  padding: 20px 24px 60px;
  display: none;
}
.settings-view.show { display: block; }
.settings-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}
.settings-header h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 20px;
  font-weight: 700;
  flex: 1;
}
.settings-export-btn {
  background: var(--ok) !important;
  color: #fff !important;
  border-color: var(--ok) !important;
}
.settings-export-btn:hover { opacity: 0.85; }
.settings-tab-nav {
  display: flex;
  gap: 2px;
  border-bottom: 2px solid var(--line);
  margin-bottom: 20px;
  overflow-x: auto;
}
.settings-tab-btn {
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  border: none;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: all 0.15s;
  background: none;
  cursor: pointer;
}
.settings-tab-btn:hover { color: var(--ink); }
.settings-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.settings-content { max-width: 800px; }
.settings-section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.settings-section-header h2 {
  font-size: 12px;
  font-weight: 700;
  flex: 1;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.6px;
}
.settings-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 16px; }
.settings-row {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.settings-row .row-main { flex: 1; min-width: 0; }
.settings-row .row-name { font-weight: 600; font-size: 13px; }
.settings-row .row-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
.settings-row .row-price { font-size: 13px; color: var(--ink-2); font-weight: 500; flex-shrink: 0; }
.settings-row .row-btns { display: flex; gap: 4px; flex-shrink: 0; }
.btn-sm { padding: 5px 10px !important; font-size: 12px !important; }
.btn-danger-ghost { background: transparent; color: var(--danger); border-color: transparent; }
.btn-danger-ghost:hover { background: #FEE2E2; }
.settings-form {
  background: var(--surface-2);
  border: 1.5px solid var(--accent);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 8px;
}
.settings-form .form-row {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: flex-start;
  flex-wrap: wrap;
}
.settings-form label {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-2);
  display: block;
  margin-bottom: 4px;
}
.settings-form input[type=text],
.settings-form input[type=number],
.settings-form select {
  padding: 7px 10px;
  border: 1.5px solid var(--line-strong);
  border-radius: var(--radius-sm);
  background: var(--surface);

.settings-form input:focus, .settings-form select:focus { border-color: var(--accent); }
.form-field { flex: 1; min-width: 140px; }

.form-actions {

  padding-top: 8px;

.settings-check-list {

  max-height: 160px;

  border-radius: var(--radius-sm);

<script>
/* ================== CHABAR ORDER SYSTEM ================== */
(function() {
'use strict';

// ============== STATE ==============
let MENU = null;
let PRICE_UNIT = 1000;

let state = {
  carts: [],          // active carts (any not completed/cancelled)
  archived: [],       // completed + cancelled
  activeCartId: null,
  view: 'order',
  orderFilter: 'all',
  search: '',
  catFilter: null,
  mobileDetailExpanded: new Set()  // mobile-only: set of cartIds whose detail panel is expanded
};

const STORAGE_KEY = 'chabar_pos_state_v2';
const MENU_OVERRIDE_KEY = 'chabar_menu_override';
const PRINT_SETTINGS_KEY = 'chabar_print_settings';
const UI_CONFIG_KEY = 'chabar-ui-config';

let uiConfig = { fontSize: 100, cartWidth: 420 };

function loadUiConfig() {
  try {
    const saved = localStorage.getItem(UI_CONFIG_KEY);
    if (saved) uiConfig = Object.assign({ fontSize: 100, cartWidth: 420 }, JSON.parse(saved));
  } catch(e) {}
}
function saveUiConfig() {
  localStorage.setItem(UI_CONFIG_KEY, JSON.stringify(uiConfig));
}
function applyUiConfig() {
  const z = uiConfig.fontSize / 100;
  $('#cat-nav').style.zoom = z;
  $('#menu-content').style.zoom = z;
  $('#cart-tabs').style.zoom = z;
  $('#cart-body').style.zoom = z;
  document.querySelector('.app').style.setProperty('--cart-width', uiConfig.cartWidth + 'px');
  const fs = uiConfig.fontSize;
  $('#ui-scale-down').classList.toggle('active', fs < 100);
  $('#ui-scale-reset').classList.toggle('active', fs === 100);
  $('#ui-scale-up').classList.toggle('active', fs > 100);
}

function initResizer() {
  const resizer = $('#panel-resizer');
  let dragging = false;
  let startX = 0;
  let startWidth = 0;

  resizer.addEventListener('mousedown', (e) => {
    dragging = true;
    startX = e.clientX;
    startWidth = uiConfig.cartWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });

  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const dx = startX - e.clientX;
    uiConfig.cartWidth = Math.max(280, Math.min(700, startWidth + dx));
    document.querySelector('.app').style.setProperty('--cart-width', uiConfig.cartWidth + 'px');
  });

  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    saveUiConfig();
  });
}

let settingsState = {
  tab: 'shop',
  editing: null,   // { section, id }
  addingIn: null,  // { section, catId? }
  expandedCat: null
};
let _dndSrc = null, _dndOverEl = null, _dndInsertBefore = true;
let _barTicketFont = null; // cached base64 font cho jsPDF

let printSettings = null; // lazy-loaded từ localStorage
function getPrintSettings() {
  if (printSettings) return printSettings;
  try { printSettings = JSON.parse(localStorage.getItem(PRINT_SETTINGS_KEY)); } catch {}
  if (!printSettings) printSettings = {
    serverUrl: 'http://localhost:3000',
    receipt:   { mode: 'dialog', printer: '' },
    barTicket: { mode: 'dialog', printer: '' }
  };
  return printSettings;
}
function savePrintSettings() {
  localStorage.setItem(PRINT_SETTINGS_KEY, JSON.stringify(printSettings));
}

// ============== UTIL ==============
const $ = (s) => document.querySelector(s);
const $$ = (s) => Array.from(document.querySelectorAll(s));

// Format price (number in JSON unit) -> display string with PRICE_UNIT applied
function fmtPrice(n) {
  return new Intl.NumberFormat('vi-VN').format(Math.round(n * PRICE_UNIT));
}
function uid(prefix) {
  return prefix + '-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 6);
}

/**
 * Generate a display order code: XXX-YY (3 digits, hyphen, 2 uppercase letters)
 * Ensures uniqueness across all current carts + today's archived orders.
 */
function genDisplayCode() {
  const today = new Date().toDateString();
  const used = new Set();
  for (const c of state.carts) if (c.displayCode) used.add(c.displayCode);
  for (const c of state.archived) {
    if (c.displayCode && new Date(c.createdAt).toDateString() === today) used.add(c.displayCode);
  }
  for (let attempt = 0; attempt < 200; attempt++) {
    const digits = String(Math.floor(Math.random() * 1000)).padStart(3, '0');
    const letters = String.fromCharCode(65 + Math.floor(Math.random() * 26)) +
                    String.fromCharCode(65 + Math.floor(Math.random() * 26));
    const code = digits + '-' + letters;
    if (!used.has(code)) return code;
  }
  // Extreme fallback: append timestamp suffix
  return Math.floor(Math.random()*1000).toString().padStart(3,'0') + '-' + 'ZZ';
}

function escHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function toast(msg) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 1800);
}

function removeAccents(s) {
  return s.normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/đ/g, 'd').replace(/Đ/g, 'D').toLowerCase();
}

// ============== STORAGE ==============
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      carts: state.carts,
      archived: state.archived,
      activeCartId: state.activeCartId
    }));
  } catch (e) { console.error('Save failed', e); }
}
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    state.carts = data.carts || [];
    state.archived = data.archived || [];
    state.activeCartId = data.activeCartId || null;
  } catch (e) { console.error('Load failed', e); }
}

function saveMenuOverride() {
  try { localStorage.setItem(MENU_OVERRIDE_KEY, JSON.stringify(MENU)); }
  catch(e) { console.error('Menu save failed', e); }
}

function exportMenuJson() {
  // Custom formatter: blank lines between top-level sections,
  // simple objects (no nested arrays) compacted to one line per item.
  const PAD = '  ';
  function isLeafObj(o) {
    return o !== null && typeof o === 'object' && !Array.isArray(o) &&
      Object.values(o).every(v => v === null || typeof v !== 'object' || (!Array.isArray(v) && isLeafObj(v)));
  }
  function fmtInline(v) {
    if (v === null || typeof v !== 'object') return JSON.stringify(v);
    if (Array.isArray(v)) return '[' + v.map(fmtInline).join(', ') + ']';
    return '{ ' + Object.keys(v).map(k => JSON.stringify(k) + ': ' + fmtInline(v[k])).join(', ') + ' }';
  }
  function fmtVal(v, d) {
    if (v === null || typeof v !== 'object') return JSON.stringify(v);
    if (Array.isArray(v)) {
      if (!v.length) return '[]';
      const ind = PAD.repeat(d), ci = PAD.repeat(d + 1);
      if (v.every(el => el === null || typeof el !== 'object')) return JSON.stringify(v);
      if (v.every(isLeafObj)) return '[\n' + v.map(el => ci + fmtInline(el)).join(',\n') + '\n' + ind + ']';
      return '[\n' + v.map(el => ci + fmtVal(el, d + 1)).join(',\n') + '\n' + ind + ']';
    }
    const ks = Object.keys(v);
    if (!ks.length) return '{}';
    const ind = PAD.repeat(d), ci = PAD.repeat(d + 1);
    return '{\n' + ks.map(k => ci + JSON.stringify(k) + ': ' + fmtVal(v[k], d + 1)).join(',\n') + '\n' + ind + '}';
  }
  const ks = Object.keys(MENU);
  const sections = ks.map((k, i) => '  ' + JSON.stringify(k) + ': ' + fmtVal(MENU[k], 1) + (i < ks.length - 1 ? ',' : ''));
  const json = '{\n' + sections.join('\n\n') + '\n}';
  const blob = new Blob([json], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'menu.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Đã xuất menu.json');
}

function slugify(s) {
  return s.normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/đ/g,'d').replace(/Đ/g,'D')
    .toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_+|_+$/g,'');
}

function readSizesFromForm() {
  const list = $('#sf-item-sizes');
  if (!list) return [];
  return Array.from(list.querySelectorAll('.sf-size-row')).map(r => ({
    size: r.querySelector('.sf-size-size').value.trim(),
    price: parseFloat(r.querySelector('.sf-size-price').value) || 0
  })).filter(s => s.size);
}

function readCheckedValues(selector) {
  return Array.from($$(selector)).filter(cb => cb.checked).map(cb => cb.value);
}

function readOptValsFromForm() {
  const list = $('#sf-optval-list');
  if (!list) return [];
  return Array.from(list.querySelectorAll('.sf-optval-row')).map(r => {
    const val = {
      value: r.querySelector('.sf-optval-value').value.trim(),
      label: r.querySelector('.sf-optval-label').value.trim()
    };
    const delta = r.querySelector('.sf-optval-delta').value.trim();
    if (delta) {
      if (delta.startsWith('{')) {
        try { val.priceDelta = JSON.parse(delta); } catch(e) { val.priceDelta = parseFloat(delta)||undefined; }
      } else {
        const n = parseFloat(delta);
        if (!isNaN(n) && n !== 0) val.priceDelta = n;
      }
    }
    return val;
  }).filter(v => v.value && v.label);
}

// ============== MENU LOAD ==============
async function loadMenu() {
  try {
    const override = localStorage.getItem(MENU_OVERRIDE_KEY);
    if (override) { MENU = JSON.parse(override); return { source: 'override' }; }
  } catch(e) { /* fallthrough */ }
  try {
    const res = await fetch('menu.json', { cache: 'no-store' });
    if (res.ok) {
      MENU = await res.json();
      return { source: 'file' };
    }
  } catch (e) { /* fallthrough */ }
  const embedded = document.getElementById('embedded-menu');
  if (embedded) {
    MENU = JSON.parse(embedded.textContent);
    return { source: 'embedded' };
  }
  throw new Error('Không có menu nào để tải');
}

// ============== MENU LOOKUPS ==============
function getItem(itemId) {
  for (const c of MENU.categories) {
    const it = c.items.find(i => i.id === itemId);
    if (it) return { item: it, category: c };
  }
  return null;
}
function getTopping(toppingId)        { return MENU.toppings.find(t => t.id === toppingId); }
function getOptionGroup(groupId)      { return MENU.optionGroups.find(g => g.id === groupId); }
function getToppingGroup(groupId)     { return MENU.toppingGroups.find(g => g.id === groupId); }

// Get the deduplicated, ordered list of toppings available for an item.
// Multiple groups may include the same topping; we keep first occurrence and group label.
function getItemToppingSections(item) {
  if (!item.toppingGroupIds || item.toppingGroupIds.length === 0) return [];
  const seen = new Set();
  const sections = [];
  for (const gid of item.toppingGroupIds) {
    const grp = getToppingGroup(gid);
    if (!grp) continue;
    const items = [];
    const toppingIdList = grp.all ? MENU.toppings.map(t => t.id) : grp.toppingIds;
    for (const tid of toppingIdList) {
      if (seen.has(tid)) continue;
      seen.add(tid);
      const top = getTopping(tid);
      if (top) items.push(top);
    }
    if (items.length > 0) {
      sections.push({ group: grp, toppings: items });
    }
  }
  return sections;
}

// ============== CART STATUS DERIVATION ==============
// Status is derived from flags. Single source of truth.
function deriveStatus(cart) {
  if (cart.cancelled) return 'cancelled';
  if (cart.paid && cart.delivered) return 'completed';
  if (cart.paid) return 'paid';
  if (cart.delivered) return 'delivered';
  return 'draft';
}

const STATUS_META = {
  draft:        { label: 'Khởi tạo',      class: 'status-draft' },
  paid:         { label: 'Đã thanh toán', class: 'status-paid' },
  delivered:    { label: 'Đã giao',       class: 'status-delivered' },
  completed:    { label: 'Hoàn thành',    class: 'status-completed' },
  cancelled:    { label: 'Đã hủy',        class: 'status-cancelled' }
};

// Cart is editable only in draft state
function isCartEditable(cart) {
  return deriveStatus(cart) === 'draft';
}

// Should this cart be archived (auto-moved out of active list)?
function shouldArchive(cart) {
  const s = deriveStatus(cart);
  return s === 'completed' || s === 'cancelled';
}

// ============== PRICE CALCULATION ==============
function calcLinePrice(line) {
  const found = getItem(line.itemId);
  if (!found) return 0;
  const item = found.item;
  const sizeObj = item.sizes.find(s => s.size === line.size);
  let basePrice = sizeObj ? sizeObj.price : 0;

  // Apply option price deltas
  if (line.options && item.optionGroupIds) {
    for (const gid of item.optionGroupIds) {
      const grp = getOptionGroup(gid);
      if (!grp) continue;
      const selected = line.options[grp.id];
      const valObj = grp.values.find(v => v.value === selected);
      if (!valObj || !valObj.priceDelta) continue;
      const d = valObj.priceDelta;
      if (typeof d === 'number') basePrice += d;
      else if (typeof d === 'object' && d[line.size] != null) basePrice += d[line.size];
    }
  }

  let toppingTotal = 0;
  if (line.toppings) {
    for (const t of line.toppings) {
      const top = getTopping(t.id);
      if (top) toppingTotal += top.price * (t.qty || 1);
    }
  }

  return (basePrice + toppingTotal) * line.qty;
}
function calcCartSubtotal(cart) {
  return cart.lines.reduce((sum, l) => sum + calcLinePrice(l), 0);
}
function calcCartDiscount(cart) {
  const sub = calcCartSubtotal(cart);
  if (!cart.discount || !cart.discount.value) return 0;
  if (cart.discount.type === 'percent') {
    return Math.min(sub, sub * cart.discount.value / 100);
  }
  return Math.min(sub, cart.discount.value);
}
function calcCartTotal(cart) {
  return calcCartSubtotal(cart) - calcCartDiscount(cart);
}

// ============== CART OPERATIONS ==============
function newCart() {
  const cart = {
    id: uid('cart'),
    displayCode: genDisplayCode(),
    customerName: '',
    lines: [],
    paid: false,
    delivered: false,
    cancelled: false,
    pinned: false,
    discount: { type: 'amount', value: 0 },
    createdAt: Date.now(),
    paidAt: null,
    deliveredAt: null,
    completedAt: null
  };
  state.carts.push(cart);
  state.activeCartId = cart.id;
  saveState();
  return cart;
}
function getActiveCart() {
  return state.carts.find(c => c.id === state.activeCartId);
}
function closeCart(cartId) {
  const cart = state.carts.find(c => c.id === cartId);
  if (!cart) return;
  if (cart.pinned) {
    toast('Giỏ đang ghim, bỏ ghim trước khi đóng');
    return;
  }
  if (cart.lines.length > 0 && deriveStatus(cart) === 'draft') {
    if (!confirm('Giỏ ' + cart.displayCode + ' còn món chưa thanh toán. Đóng giỏ này (dữ liệu sẽ mất)?')) return;
  } else if (deriveStatus(cart) !== 'draft') {
    if (!confirm('Đóng giỏ ' + cart.displayCode + '? Đơn này chưa hoàn thành sẽ vào tab "Đơn hàng" với trạng thái hiện tại.')) return;
    // Move to archived as-is
    state.archived.push(cart);
  }
  state.carts = state.carts.filter(c => c.id !== cartId);
  state.mobileDetailExpanded.delete(cartId);
  if (state.activeCartId === cartId) {
    const remaining = state.carts;
    state.activeCartId = remaining.length > 0 ? remaining[0].id : null;
  }
  saveState();
  renderAll();
}
function togglePin(cartId) {
  const cart = state.carts.find(c => c.id === cartId);
  if (!cart) return;
  cart.pinned = !cart.pinned;
  saveState();
  renderCart();
}

// ============== FLAG ACTIONS (the heart of the new logic) ==============
function setPaid(cart, val) {
  cart.paid = val;
  cart.paidAt = val ? Date.now() : null;
  afterFlagChange(cart);
}
function setDelivered(cart, val) {
  cart.delivered = val;
  cart.deliveredAt = val ? Date.now() : null;
  afterFlagChange(cart);
}
function setCancelled(cart) {
  cart.cancelled = true;
  cart.completedAt = Date.now();
  // Move to archived
  state.archived.push(cart);
  state.carts = state.carts.filter(c => c.id !== cart.id);
  state.mobileDetailExpanded.delete(cart.id);
  if (state.activeCartId === cart.id) {
    state.activeCartId = state.carts.length > 0 ? state.carts[0].id : null;
  }
  saveState();
}
function afterFlagChange(cart) {
  // If both flags now true → completed, archive automatically
  if (cart.paid && cart.delivered && !cart.completedAt) {
    cart.completedAt = Date.now();
    state.archived.push(cart);
    state.carts = state.carts.filter(c => c.id !== cart.id);
    state.mobileDetailExpanded.delete(cart.id);
    if (state.activeCartId === cart.id) {
      state.activeCartId = state.carts.length > 0 ? state.carts[0].id : null;
    }
    toast('Đơn ' + cart.displayCode + ' đã hoàn thành ✓');
  }
  saveState();
}

// ============== ITEM CONFIG MODAL ==============
let modalState = null;
let pendingRemoveIdx = null; // index of line awaiting delete confirmation

function openItemModal(itemId, editLineIdx, initialSize) {
  const found = getItem(itemId);
  if (!found) return;
  const item = found.item;

  let initial;
  if (editLineIdx != null) {
    const cart = getActiveCart();
    initial = JSON.parse(JSON.stringify(cart.lines[editLineIdx]));
    initial.editLineIdx = editLineIdx;
  } else {
    const opts = {};
    if (item.optionGroupIds) {
      for (const gid of item.optionGroupIds) {
        const grp = getOptionGroup(gid);
        if (grp) opts[grp.id] = grp.default;
      }
    }
    const validSize = initialSize && item.sizes.find(s => s.size === initialSize)
      ? initialSize : item.sizes[0].size;
    initial = {
      itemId: item.id,
      size: validSize,
      options: opts,
      toppings: [],
      qty: 1,
      note: '',
      editLineIdx: null
    };
  }
  modalState = initial;
  renderItemModal();
  $('#item-modal').classList.add('show');
}

function renderItemModal() {
  if (!modalState) return;
  const found = getItem(modalState.itemId);
  if (!found) return;
  const item = found.item;
  $('#modal-title').textContent = item.name;

  let html = '';

  // Size
  if (item.sizes.length > 1) {
    html += `<div class="opt-section"><h4>Size</h4><div class="opt-chips">`;
    for (const s of item.sizes) {
      const sel = s.size === modalState.size ? 'selected' : '';
      html += `<button class="opt-chip ${sel}" data-act="size" data-val="${s.size}">${s.size} <span class="delta">${fmtPrice(s.price)}đ</span></button>`;
    }
    html += `</div></div>`;
  }

  // Options
  if (item.optionGroupIds) {
    for (const gid of item.optionGroupIds) {
      const grp = getOptionGroup(gid);
      if (!grp) continue;
      html += `<div class="opt-section"><h4>${escHtml(grp.label)}</h4><div class="opt-chips">`;
      for (const v of grp.values) {
        const sel = modalState.options[grp.id] === v.value ? 'selected' : '';
        let deltaTxt = '';
        if (v.priceDelta) {
          const d = typeof v.priceDelta === 'number' ? v.priceDelta : v.priceDelta[modalState.size];
          if (d) deltaTxt = `<span class="delta">+${fmtPrice(d)}đ</span>`;
        }
        html += `<button class="opt-chip ${sel}" data-act="opt" data-key="${grp.id}" data-val="${v.value}">${escHtml(v.label)} ${deltaTxt}</button>`;
      }
      html += `</div></div>`;
    }
  }

  // Topping sections (grouped)
  const toppingSections = getItemToppingSections(item);
  if (toppingSections.length > 0) {
    html += `<div class="opt-section"><h4>Topping</h4>`;
    for (const sec of toppingSections) {
      // Show group heading only if more than 1 group
      if (toppingSections.length > 1) {
        html += `<div class="topping-group-section"><h5>${escHtml(sec.group.name)}</h5><div class="topping-list">`;
      } else {
        html += `<div class="topping-list">`;
      }
      for (const top of sec.toppings) {
        const existing = modalState.toppings.find(t => t.id === top.id);
        const sel = existing ? 'selected' : '';
        const qtyTxt = existing && existing.qty > 1 ? ` x${existing.qty}` : '';
        html += `<button class="topping-item ${sel}" data-act="topping" data-id="${top.id}">
          <span class="name">${escHtml(top.name)}${qtyTxt}</span>
          <span class="price">+${fmtPrice(top.price)}đ</span>
        </button>`;
      }
      if (toppingSections.length > 1) html += `</div></div>`;
      else html += `</div>`;
    }
    html += `<div class="topping-help">Click thêm: tăng SL · Chuột phải: bỏ chọn</div></div>`;
  }

  html += `<div class="opt-section"><h4>Ghi chú</h4>
    <textarea class="note-input" id="line-note" placeholder="VD: ít ngọt, không lạnh quá...">${escHtml(modalState.note || '')}</textarea>
  </div>`;

  $('#modal-body').innerHTML = html;

  // Update footer: qty controls (left) + price (center) + action buttons stay as-is
  const linePrice = calcLinePrice(modalState);
  $('#modal-foot-qty').innerHTML = `
    <button data-act="qty" data-d="-1">−</button>
    <span>${modalState.qty}</span>
    <button data-act="qty" data-d="1">+</button>`;
  $('#modal-foot-price').textContent = fmtPrice(linePrice) + 'đ';
  $('#modal-add').textContent = modalState.editLineIdx != null ? 'Cập nhật' : 'Thêm vào giỏ';
}

function modalEvent(e) {
  const target = e.target.closest('[data-act]');
  if (!target) return;
  const act = target.dataset.act;
  if (act === 'size') {
    modalState.size = target.dataset.val;
  } else if (act === 'opt') {
    modalState.options[target.dataset.key] = target.dataset.val;
  } else if (act === 'topping') {
    const id = target.dataset.id;
    if (e.type === 'contextmenu') {
      modalState.toppings = modalState.toppings.filter(t => t.id !== id);
      e.preventDefault();
    } else {
      const ex = modalState.toppings.find(t => t.id === id);
      if (ex) ex.qty = (ex.qty || 1) + 1;
      else modalState.toppings.push({ id, qty: 1 });
    }
  } else if (act === 'qty') {
    const d = parseInt(target.dataset.d);
    modalState.qty = Math.max(1, modalState.qty + d);
  }
  const noteEl = $('#line-note');
  if (noteEl) modalState.note = noteEl.value;
  renderItemModal();
}

function closeModal() {
  $('#item-modal').classList.remove('show');
  modalState = null;
}
function commitModal() {
  if (!modalState) return;
  modalState.note = $('#line-note') ? $('#line-note').value : '';
  let cart = getActiveCart();
  if (!cart) cart = newCart();
  if (!isCartEditable(cart)) {
    toast('Đơn đã chốt, không thể sửa');
    return;
  }
  const line = {
    itemId: modalState.itemId,
    size: modalState.size,
    options: modalState.options,
    toppings: modalState.toppings,
    qty: modalState.qty,
    note: modalState.note,
    barPrinted: false
  };
  if (modalState.editLineIdx != null) {
    cart.lines[modalState.editLineIdx] = line;
    toast('Đã cập nhật');
  } else {
    cart.lines.push(line);
    toast('Đã thêm vào giỏ');
  }
  saveState();
  closeModal();
  renderCart();
}

// ============== RENDER MENU ==============
function renderMenu() {
  const catNav = $('#cat-nav');
  let navHtml = `<button class="${state.catFilter == null ? 'active' : ''}" data-cat="">Tất cả</button>`;
  for (const c of MENU.categories) {
    navHtml += `<button class="${state.catFilter === c.id ? 'active' : ''}" data-cat="${c.id}">${escHtml(c.name)}</button>`;
  }
  catNav.innerHTML = navHtml;

  const search = state.search.toLowerCase().trim();
  const searchNorm = removeAccents(search);

  const content = $('#menu-content');
  let html = '';
  for (const cat of MENU.categories) {
    if (state.catFilter && state.catFilter !== cat.id) continue;
    const items = cat.items.filter(it => {
      if (!search) return true;
      return removeAccents(it.name + ' ' + cat.name).includes(searchNorm);
    });
    if (items.length === 0) continue;
    html += `<div class="category"><h2>${escHtml(cat.name)}</h2><div class="items-grid">`;
    for (const it of items) {
      const priceTags = it.sizes.map(s => `<span class="price-tag" data-size="${s.size}">${s.size} ${fmtPrice(s.price)}đ</span>`).join('');
      const badges = [];
      if (it.isNew) badges.push('<span class="badge-new">NEW</span>');
      if (it.hot) badges.push('<span class="badge-hot">HOT</span>');
      html += `<button class="item-card" data-item="${it.id}">
        ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
        <div class="name">${escHtml(it.name)}</div>
        <div class="price-row">${priceTags}</div>
      </button>`;
    }
    html += `</div></div>`;
  }
  if (!html) html = '<div style="text-align:center;padding:40px;color:var(--muted)">Không có món nào.</div>';
  content.innerHTML = html;
}

// ============== RENDER CART ==============
function renderCartTabs() {
  const tabs = $('#cart-tabs');
  let html = '';
  // Keep original insertion order (createdAt), pinned does not affect position
  const sorted = [...state.carts].sort((a, b) => a.createdAt - b.createdAt);
  for (const c of sorted) {
    const isActive = c.id === state.activeCartId;
    const label = c.customerName || c.displayCode;
    const pinIcon = c.paid ? '💰' : (c.pinned ? '📌' : '📍');
    html += `<button class="cart-tab ${isActive ? 'active' : ''}${c.paid ? ' paid' : ''}" data-cart="${c.id}">
      <span class="pin ${c.pinned ? 'active' : ''}" data-pin="${c.id}" title="${c.pinned ? 'Bỏ ghim' : 'Ghim giỏ'}">${pinIcon}</span>
      <span>${escHtml(label)}</span>
      ${c.lines.length > 0 ? `<span style="font-size:10px;color:var(--muted)">(${c.lines.reduce((s, l) => s + l.qty, 0)})</span>` : ''}
      <span class="close ${c.pinned ? 'disabled' : ''}" data-close="${c.id}" title="${c.pinned ? 'Bỏ ghim trước' : 'Đóng giỏ'}">×</span>
    </button>`;
  }
  html += `<button class="cart-tab add-cart" id="add-cart-btn" title="Tạo giỏ mới">+</button>`;
  tabs.innerHTML = html;

  // After rendering, measure cart-tabs height (for mobile detail panel positioning)
  // Run on next frame to let layout settle.
  if (isMobile()) {
    requestAnimationFrame(() => {
      const h = tabs.offsetHeight;
      document.documentElement.style.setProperty('--cart-tabs-h', h + 'px');
    });
  }
}

// Detect if viewport is mobile size
function isMobile() {
  return window.matchMedia('(max-width: 768px)').matches;
}

// Build the cart detail HTML (header + lines + customer input). Pure function.
function buildCartDetailHtml(cart) {
  const status = deriveStatus(cart);
  const meta = STATUS_META[status];
  const editable = isCartEditable(cart);

  let html = `<div class="cart-header">
    <span class="cart-id">${escHtml(cart.displayCode)}</span>
    <span class="cart-status ${meta.class}">${meta.label}</span>
  </div>`;

  if (status !== 'draft' && status !== 'cancelled') {
    html += `<div class="flag-row">
      <span class="flag-chip ${cart.paid ? 'on' : ''}">${cart.paid ? '✓' : '○'} Thanh toán</span>
      <span class="flag-chip ${cart.delivered ? 'on' : ''}">${cart.delivered ? '✓' : '○'} Giao hàng</span>
    </div>`;
  }

  html += `<div class="cart-customer" style="margin-top:10px">
    <input type="text" id="customer-name" placeholder="Tên khách / số bàn (tùy chọn)" value="${escHtml(cart.customerName)}" ${!editable ? 'disabled' : ''}>
  </div>`;

  if (cart.lines.length === 0) {
    html += `<div class="empty-cart">Giỏ trống.<br>Click món để thêm.</div>`;
  } else {
    for (let i = 0; i < cart.lines.length; i++) {
      const line = cart.lines[i];
      const found = getItem(line.itemId);
      if (!found) continue;
      const item = found.item;

      // Size with base price
      const sizeObj = item.sizes.find(s => s.size === line.size);
      const sizeBasePrice = sizeObj ? sizeObj.price : 0;
      const optParts = [`Size ${line.size} (${fmtPrice(sizeBasePrice)}đ)`];
      if (item.optionGroupIds) {
        for (const gid of item.optionGroupIds) {
          const grp = getOptionGroup(gid);
          if (!grp) continue;
          const v = line.options[grp.id];
          if (!v) continue;
          const valObj = grp.values.find(vv => vv.value === v);
          if (!valObj) continue;
          let optLabel = valObj.label;
          if (valObj.priceDelta) {
            const d = typeof valObj.priceDelta === 'number' ? valObj.priceDelta : (valObj.priceDelta[line.size] || 0);
            if (d) optLabel += ` (+${fmtPrice(d)}đ)`;
          }
          if (grp.required) optParts.push(`${grp.label}: ${optLabel}`);
          else if (v !== grp.default) optParts.push(optLabel);
        }
      }

      const tops = (line.toppings || []).map(t => {
        const top = getTopping(t.id);
        if (!top) return '';
        const qty = t.qty || 1;
        return top.name + (qty > 1 ? ` x${qty}` : '') + ` (+${fmtPrice(top.price * qty)}đ)`;
      }).filter(Boolean);

      const linePrice = calcLinePrice(line);
      const isPending = pendingRemoveIdx === i;

      html += `<div class="line">
        ${editable ? (isPending
          ? `<button class="line-remove-confirm" data-rm-confirm="${i}">✕</button>`
          : `<button class="line-remove" data-rm-line="${i}">×</button>`) : ''}
        <div class="line-name">${escHtml(item.name)}</div>
        <div class="line-meta">${optParts.map(escHtml).join(' · ')}</div>
        ${tops.length ? `<div class="line-toppings">+ ${tops.map(escHtml).join(' · ')}</div>` : ''}
        ${line.note ? `<div class="line-toppings">📝 ${escHtml(line.note)}</div>` : ''}
        <div class="line-bottom">
          ${editable && !line.barPrinted ? `<div class="qty-ctl">
            <button data-line-qty="${i}" data-d="-1">−</button>
            <span>${line.qty}</span>
            <button data-line-qty="${i}" data-d="1">+</button>
          </div>` : `<span style="font-size:12px;color:var(--muted)">SL: ${line.qty}</span>`}
          <span class="line-price">${fmtPrice(linePrice / line.qty)}đ</span>
          <span class="line-total">${fmtPrice(linePrice)}đ</span>
        </div>
        <div class="line-actions">
          ${editable && !line.barPrinted ? `<button class="line-edit" data-edit-line="${i}">Sửa tùy chọn</button>` : ''}
          <button class="line-print-btn" data-print-line="${i}">🖨 In tem món</button>
          ${line.barPrinted ? '<span class="bar-printed-badge">✓ Đã in tem</span>' : ''}
        </div>
      </div>`;
    }
  }
  return html;
}

// Build the cart footer HTML (totals + actions). Pure function.
function buildCartFooterHtml(cart) {
  const status = deriveStatus(cart);
  const editable = isCartEditable(cart);
  const sub = calcCartSubtotal(cart);
  const disc = calcCartDiscount(cart);
  const total = sub - disc;
  let html = '';

  if (cart.lines.length > 0) {
    html += `<div class="discount-row">
      <label>Giảm giá:</label>
      <input type="number" id="discount-value" min="0" value="${cart.discount.value || 0}" ${!editable ? 'disabled' : ''}>
      <select id="discount-type" ${!editable ? 'disabled' : ''}>
        <option value="amount" ${cart.discount.type === 'amount' ? 'selected' : ''}>Nghìn đ</option>
        <option value="percent" ${cart.discount.type === 'percent' ? 'selected' : ''}>%</option>
      </select>
    </div>`;
    html += `<div class="totals">
      <div class="total-row"><span>Tạm tính</span><span>${fmtPrice(sub)}đ</span></div>`;
    if (disc > 0) html += `<div class="total-row"><span>Giảm</span><span>-${fmtPrice(disc)}đ</span></div>`;
    html += `<div class="total-row grand"><span>TỔNG</span><span class="val">${fmtPrice(total)}đ</span></div></div>`;
  }

  if (status !== 'cancelled' && status !== 'completed') {
    if (cart.lines.length > 0) {
      html += `<div class="action-row">
        <button class="btn btn-secondary" data-act="print-bar">🧋 In phiếu pha chế</button>
        <button class="btn btn-secondary" data-act="print-receipt">🧾 In hóa đơn</button>
      </div>`;
    }
    html += `<div class="action-row">
      <button class="btn btn-flag ${cart.paid ? 'on' : ''}" data-act="toggle-paid" ${cart.lines.length === 0 ? 'disabled' : ''}>
        ${cart.paid ? '✓ Đã thanh toán' : 'Đã thanh toán?'}
      </button>
      <button class="btn btn-flag ${cart.delivered ? 'on' : ''}" data-act="toggle-delivered" ${cart.lines.length === 0 ? 'disabled' : ''}>
        ${cart.delivered ? '✓ Đã giao' : 'Đã giao?'}
      </button>
    </div>`;
    html += `<div class="action-row full">
      <button class="btn btn-danger-outline" data-act="cancel">Hủy đơn</button>
    </div>`;
  }
  return html;
}

// Build summary chips for mobile (line items in compact form)
function buildMobileSummaryChips(cart) {
  if (!cart || cart.lines.length === 0) return '';
  const chips = cart.lines.map(line => {
    const found = getItem(line.itemId);
    if (!found) return '';
    return `<span class="summary-chip">${escHtml(found.item.name)} - ${escHtml(line.size)} <span class="qty">×${line.qty}</span></span>`;
  }).filter(Boolean).join('');
  if (!chips) return '';
  return `<span class="summary-label">Tóm tắt</span>${chips}`;
}

function renderCart() {
  renderCartTabs();
  const cart = getActiveCart();
  const body = $('#cart-body');
  const footer = $('#cart-footer');
  const mobileMode = isMobile();

  if (!cart) {
    const emptyMsg = `<div class="empty-cart">
      Chưa có giỏ hàng nào.<br>Bấm <strong>+</strong> phía trên để tạo giỏ mới,<br>hoặc click 1 món bất kỳ.
    </div>`;
    body.innerHTML = emptyMsg;
    footer.innerHTML = '';
    if (mobileMode) {
      $('#mobile-detail-content').innerHTML = emptyMsg;
      $('#mobile-detail-footer').innerHTML = '';
      renderMobileSummary(null);
      // Always-on if no draft cart possible? Actually if no cart, nothing to show.
      // Just keep panel collapsed.
      collapseMobileDetail();
    }
    return;
  }

  const status = deriveStatus(cart);
  const detailHtml = buildCartDetailHtml(cart);
  const footerHtml = buildCartFooterHtml(cart);

  if (mobileMode) {
    // === MOBILE LAYOUT ===
    // body shows the menu (so user can browse + add items) when status is draft.
    // detail panel is the slide-up overlay.
    if (status === 'draft') {
      // Render menu (toolbar + items) directly into cart-body
      body.innerHTML = buildMobileMenuHtml();
      footer.innerHTML = ''; // desktop footer not used on mobile

      // Render detail content into the slide-up panel
      $('#mobile-detail-content').innerHTML = detailHtml;
      $('#mobile-detail-footer').innerHTML = footerHtml;

      // Summary + pay button at bottom
      renderMobileSummary(cart);

      // Panel mode: not always-on (user can collapse)
      const panel = $('#mobile-detail-panel');
      panel.classList.remove('always-on');
      // Apply expanded state instantly (no slide) — animation only on explicit user tap
      panel.classList.add('no-transition');
      if (state.mobileDetailExpanded.has(cart.id)) {
        panel.classList.add('expanded');
        $('#mobile-summary').classList.add('hidden');
      } else {
        panel.classList.remove('expanded');
        $('#mobile-summary').classList.remove('hidden');
      }
      requestAnimationFrame(() => panel.classList.remove('no-transition'));
    } else {
      // Non-draft: panel is always on, no menu visible, no summary
      body.innerHTML = '';
      footer.innerHTML = '';
      $('#mobile-detail-content').innerHTML = detailHtml;
      $('#mobile-detail-footer').innerHTML = footerHtml;
      $('#mobile-detail-panel').classList.add('always-on');
      $('#mobile-detail-panel').classList.add('expanded');
      $('#mobile-summary').classList.add('hidden');
    }
  } else {
    // === DESKTOP LAYOUT ===
    body.innerHTML = detailHtml;
    footer.innerHTML = footerHtml;
    // Make sure mobile detail panel is collapsed
    $('#mobile-detail-panel').classList.remove('expanded', 'always-on');
    $('#mobile-summary').classList.remove('hidden');
  }
}

// Build mobile menu HTML: sticky toolbar (search + categories) + items grid

  for (const c of MENU.categories) {
    toolbarHtml += `<button class="${state.catFilter === c.id ? 'active' : ''}" data-cat="${c.id}">${escHtml(c.name)}</button>`;
  }
  toolbarHtml += `</div></div>`;

  // Content HTML
  let contentHtml = '<div class="mobile-menu-content">';
  let hasItems = false;

    const items = cat.items.filter(it => {
      if (!search) return true;
      return removeAccents(it.name + ' ' + cat.name).includes(searchNorm);
    });
    if (items.length === 0) continue;
    hasItems = true;
    contentHtml += `<div class="category"><h2>${escHtml(cat.name)}</h2><div class="items-grid">`;
    for (const it of items) {
      const priceTags = it.sizes.map(s => `<span class="price-tag" data-size="${s.size}">${s.size} ${fmtPrice(s.price)}đ</span>`).join('');
      const badges = [];
      if (it.isNew) badges.push('<span class="badge-new">NEW</span>');
      if (it.hot) badges.push('<span class="badge-hot">HOT</span>');
      contentHtml += `<button class="item-card" data-item="${it.id}">
        ${badges.length ? `<div class="badges">${badges.join('')}</div>` : ''}
        <div class="name">${escHtml(it.name)}</div>
        <div class="price-row">${priceTags}</div>
      </button>`;
    }
    contentHtml += `</div></div>`;
  }
  if (!hasItems) contentHtml += '<div style="text-align:center;padding:40px;color:var(--muted)">Không có món nào.</div>';
  contentHtml += '</div>';

  return toolbarHtml + contentHtml;
}

function renderMobileSummary(cart) {
  const summaryEl = $('#mobile-summary');
  const linesEl = $('#mobile-summary-lines');
  const payBtn = $('#mobile-pay-btn');
  const labelEl = $('#mobile-pay-label');
  const totalEl = $('#mobile-pay-total');

  if (!cart) {
    linesEl.innerHTML = '';
    labelEl.textContent = 'Thanh toán · 0 ly';
    totalEl.textContent = '0đ';
    payBtn.disabled = true;
    return;
  }

  // Chips (empty when no lines → CSS hides via :empty)
  linesEl.innerHTML = buildMobileSummaryChips(cart);

  const totalQty = cart.lines.reduce((s, l) => s + l.qty, 0);
  const total = calcCartTotal(cart);
  labelEl.textContent = `Thanh toán · ${totalQty} ly`;
  totalEl.textContent = fmtPrice(total) + 'đ';
  payBtn.disabled = cart.lines.length === 0;
}

function expandMobileDetail() {
  if (state.activeCartId) state.mobileDetailExpanded.add(state.activeCartId);
  $('#mobile-detail-panel').classList.add('expanded');
  $('#mobile-summary').classList.add('hidden');
}
function collapseMobileDetail() {
  if (state.activeCartId) state.mobileDetailExpanded.delete(state.activeCartId);
  $('#mobile-detail-panel').classList.remove('expanded');
  $('#mobile-summary').classList.remove('hidden');
}

// ============== RENDER ORDERS VIEW ==============
function renderOrders() {
  // Combine archived + active carts that are not draft (so user sees in-progress ones too)
  const allOrders = [
    ...state.carts.filter(c => deriveStatus(c) !== 'draft'),
    ...state.archived
  ].sort((a, b) => (b.completedAt || b.paidAt || b.deliveredAt || b.createdAt) -
                    (a.completedAt || a.paidAt || a.deliveredAt || a.createdAt));

  $('#orders-badge').textContent = allOrders.length;

  let filtered = allOrders;
  if (state.orderFilter !== 'all') {
    filtered = allOrders.filter(c => deriveStatus(c) === state.orderFilter);
  }

  const list = $('#order-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px;color:var(--muted);grid-column:1/-1">Chưa có đơn nào.</div>';
    return;
  }

  let html = '';
  for (const c of filtered) {
    const status = deriveStatus(c);
    const meta = STATUS_META[status];
    const total = calcCartTotal(c);
    const dt = new Date(c.completedAt || c.paidAt || c.deliveredAt || c.createdAt);
    const dtStr = dt.toLocaleString('vi-VN', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
    const summary = c.lines.map(l => {
      const found = getItem(l.itemId);
      return found ? `${found.item.name} (${l.size}) ×${l.qty}` : '';
    }).filter(Boolean).join(' · ');
    html += `<div class="order-card" data-order-id="${c.id}">
      <div class="head">
        <span class="oid">${escHtml(c.displayCode)}</span>
        <span class="cart-status ${meta.class}">${meta.label}</span>
      </div>
      <div class="meta">${dtStr}${c.customerName ? ' · ' + escHtml(c.customerName) : ''}</div>
      <div class="lines-summary">${escHtml(summary || '(trống)')}</div>
      <div class="total">${fmtPrice(total)}đ</div>
    </div>`;
  }
  list.innerHTML = html;
}

function renderSettings() {
  const tabs = [
    {id:'shop', label:'Cửa hàng'},
    {id:'toppings', label:'Topping'},
    {id:'toppingGroups', label:'Nhóm topping'},
    {id:'optionGroups', label:'Tùy chọn'},
    {id:'categories', label:'Danh mục'},
    {id:'printers', label:'🖨 Máy In'}
  ];
  const tabNav = tabs.map(t =>
    `<button class="settings-tab-btn${settingsState.tab===t.id?' active':''}" data-stab="${t.id}">${t.label}</button>`
  ).join('');

  let content = '';
  if (settingsState.tab === 'shop') content = renderSettingsShop();
  else if (settingsState.tab === 'toppings') content = renderSettingsToppings();
  else if (settingsState.tab === 'toppingGroups') content = renderSettingsToppingGroups();
  else if (settingsState.tab === 'optionGroups') content = renderSettingsOptionGroups();
  else if (settingsState.tab === 'categories') content = renderSettingsCategories();
  else if (settingsState.tab === 'printers')  content = renderSettingsPrinters();

  $('#settings-view').innerHTML = `
    <div class="settings-header">
      <h1>Cài đặt Menu</h1>
      <button class="btn settings-export-btn" data-sact="export">Xuất JSON</button>
    </div>
    <div class="settings-tab-nav">${tabNav}</div>
    <div class="settings-content">${content}</div>`;

  // Wire radio toggle for topping group type
  $$('input[name="sf-tgroup-type"]').forEach(r => r.addEventListener('change', () => {
    const sec = $('#sf-tgroup-custom-section');
    if (sec) sec.style.display = r.value === 'all' ? 'none' : '';
  }));

  // Auto-slug ID from name for add forms
  const nameEl = $('#sf-topping-name') || $('#sf-tgroup-name') || $('#sf-optgroup-label') || $('#sf-cat-name') || $('#sf-item-name');
  const idEl = nameEl && (nameEl.id === 'sf-optgroup-label' ? $('#sf-optgroup-id') :
    nameEl.id === 'sf-topping-name' ? $('#sf-topping-id') :
    nameEl.id === 'sf-tgroup-name' ? $('#sf-tgroup-id') :
    nameEl.id === 'sf-cat-name' ? $('#sf-cat-id') :
    nameEl.id === 'sf-item-name' ? $('#sf-item-id') : null);
  if (nameEl && idEl && !idEl.readOnly) {
    nameEl.addEventListener('input', () => {
      if (!idEl.value) idEl.value = slugify(nameEl.value);
    });
  }
}

      <label style="display:flex;align-items:center;gap:6px;font-weight:400"><input type="checkbox" id="sf-item-isnew"${item?.isNew?' checked':''}> ✨ New</label>
